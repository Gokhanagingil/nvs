name: apply-final-m1-02b

on:
  push:
    branches:
      - agent/m1-02b-final-fixes

permissions:
  contents: write

concurrency:
  group: apply-final-m1-02b
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/m1-02b-final-fixes
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Apply patch
        run: python3 .github/scripts/apply-final-m1-02b.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format changed sources
        run: pnpm exec prettier --write packages/core/src/index.ts packages/adapter-niles/src/index.ts packages/contracts/src/index.ts tests/live-incident.test.ts fixtures/niles-incident/staging.example.yaml
      - name: Focused regressions
        run: pnpm exec vitest run tests/niles-incident-adapter.test.ts tests/live-incident.test.ts tests/storage.test.ts
      - name: Full quality gate
        run: pnpm run ci
      - name: Shell and diff validation
        run: |
          bash -n ops/*.sh ops/ci/*.sh
          git diff --check
      - name: Commit verified code only
        run: |
          rm -f .github/scripts/apply-final-m1-02b.py .github/workflows/apply-final-m1-02b.yml
          git config user.name "nvs-maintenance-bot"
          git config user.email "nvs-maintenance-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: close final M1-02B safety blockers"
          git push origin HEAD:agent/m1-02b-final-fixes
