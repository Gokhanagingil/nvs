name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run ci
      - name: Validate deployment shell
        run: bash -n ops/*.sh ops/ci/*.sh
      - name: Build exact production image
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          docker build \
            --build-arg "NVS_BUILD_SHA=${BUILD_SHA}" \
            --build-arg "NVS_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg "NVS_RELEASE_VERSION=0.1.0" \
            --tag "nvs:${BUILD_SHA}" \
            .
      - name: Prove bind mounts, read-only root, and ownership readiness
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-container-hardening.sh "$BUILD_SHA"
      - name: Prove deploy rollback, same-SHA reference, and archive checksum
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-deploy-rollback.sh "$BUILD_SHA"
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-diagnostics
          path: |
            artifacts/playwright
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  diagnose-reviewed-staging-fixtures:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'ops/prepare-staging-fixtures-6747-via-ci'
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish only the sanitized failure tail and latest protected workflow result
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: 29512209038
        run: |
          set -Eeuo pipefail
          repo="$GITHUB_REPOSITORY"
          raw="$RUNNER_TEMP/failed-run.log"
          safe="$RUNNER_TEMP/failed-run-safe.log"
          set +e
          gh run view "$FAILED_RUN_ID" --repo "$repo" --log-failed > "$raw" 2>&1
          view_status=$?
          set -e
          tail -n 180 "$raw" \
            | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
            > "$safe"

          bootstrap_json="$(gh run list \
            --repo "$repo" \
            --workflow staging-fixture-bootstrap.yml \
            --branch main \
            --event workflow_dispatch \
            --limit 3 \
            --json databaseId,status,conclusion,createdAt,url,headSha)"
          latest_bootstrap_id="$(printf '%s' "$bootstrap_json" | jq -r '.[0].databaseId // 0')"
          artifact_dir="$RUNNER_TEMP/latest-bootstrap"
          mkdir -p "$artifact_dir"
          if [[ "$latest_bootstrap_id" != 0 ]]; then
            gh run download "$latest_bootstrap_id" \
              --repo "$repo" \
              --name "nvs-staging-fixture-bootstrap-${latest_bootstrap_id}-1" \
              --dir "$artifact_dir" || true
          fi

          {
            echo '## Sanitized staging preparation diagnostic'
            echo
            echo "- Failed outer run: \`$FAILED_RUN_ID\`"
            echo "- Failed-log fetch status: \`$view_status\`"
            echo '- Recent bootstrap runs:'
            echo '```json'
            printf '%s\n' "$bootstrap_json"
            echo '```'
            echo
            echo '### Sanitized failed tail'
            echo '```text'
            cat "$safe"
            echo '```'
            if [[ -f "$artifact_dir/nvs-staging-fixture-bootstrap.md" ]]; then
              echo
              echo '### Latest sanitized bootstrap artifact'
              cat "$artifact_dir/nvs-staging-fixture-bootstrap.md"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
