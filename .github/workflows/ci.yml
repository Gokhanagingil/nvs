name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run ci
      - name: Validate deployment shell
        run: bash -n ops/*.sh ops/ci/*.sh
      - name: Build exact production image
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          docker build \
            --build-arg "NVS_BUILD_SHA=${BUILD_SHA}" \
            --build-arg "NVS_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg "NVS_RELEASE_VERSION=0.1.0" \
            --tag "nvs:${BUILD_SHA}" \
            .
      - name: Prove bind mounts, read-only root, and ownership readiness
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-container-hardening.sh "$BUILD_SHA"
      - name: Prove deploy rollback, same-SHA reference, and archive checksum
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-deploy-rollback.sh "$BUILD_SHA"
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-diagnostics
          path: |
            artifacts/playwright
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  apply-canonical-sla-state-order:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'ops/prepare-staging-fixtures-6747-via-ci'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out the clean implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-canonical-sla-state-order
          persist-credentials: true
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Apply and verify the canonical snapshot correction
        run: |
          set -Eeuo pipefail
          pnpm install --frozen-lockfile
          python3 - <<'PY'
          from pathlib import Path

          bootstrap = Path('ops/staging-fixture-bootstrap.mjs')
          source = bootstrap.read_text(encoding='utf-8')
          old = "    stopOnStates: ['resolved', 'closed'],"
          new = "    stopOnStates: ['closed', 'resolved'],"
          if source.count(old) != 1:
              raise SystemExit('expected exactly one non-canonical stopOnStates sequence')
          bootstrap.write_text(source.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/staging-fixture-bootstrap-assets.test.ts')
          test_source = test.read_text(encoding='utf-8')
          anchor = "    expect(source).toContain(\"operator: 'is', value: serviceId\");\n"
          replacement = (
              anchor
              + "    expect(source).toContain(\"stopOnStates: ['closed', 'resolved']\");\n"
              + "    expect(source).not.toContain(\"stopOnStates: ['resolved', 'closed']\");\n"
          )
          if test_source.count(anchor) != 1:
              raise SystemExit('expected exactly one bootstrap SLA assertion anchor')
          test.write_text(test_source.replace(anchor, replacement, 1), encoding='utf-8')
          PY
          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          git diff --check

      - name: Push only the implementation correction
        run: |
          set -Eeuo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git add ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          git commit -m 'fix: canonicalize governed SLA stop-state order'
          git push origin HEAD:fix/bootstrap-canonical-sla-state-order
