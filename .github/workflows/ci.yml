name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run ci
      - name: Validate deployment shell
        run: bash -n ops/*.sh ops/ci/*.sh
      - name: Build exact production image
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          docker build \
            --build-arg "NVS_BUILD_SHA=${BUILD_SHA}" \
            --build-arg "NVS_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg "NVS_RELEASE_VERSION=0.1.0" \
            --tag "nvs:${BUILD_SHA}" \
            .
      - name: Prove bind mounts, read-only root, and ownership readiness
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-container-hardening.sh "$BUILD_SHA"
      - name: Prove deploy rollback, same-SHA reference, and archive checksum
        env:
          BUILD_SHA: ${{ github.sha }}
        run: bash ops/ci/proof-deploy-rollback.sh "$BUILD_SHA"
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-diagnostics
          path: |
            artifacts/playwright
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  apply_configuration_approver:
    needs: foundation
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'ops/direct-config-approver-ci' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
          show-progress: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Apply the reviewed source correction to a clean branch
        id: apply
        continue-on-error: true
        run: |
          exec > >(tee /tmp/config-approver-apply.log) 2>&1
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git fetch --quiet origin fix/bootstrap-configuration-approver
          pnpm install --frozen-lockfile --reporter=silent

          mkdir -p tools
          git show \
            origin/fix/bootstrap-configuration-approver:tools/apply-bootstrap-configuration-approver-v2.py \
            > tools/.tmp-apply-bootstrap-configuration-approver.py

          python3 - <<'PY'
          from pathlib import Path

          patch = Path('tools/.tmp-apply-bootstrap-configuration-approver.py')
          text = patch.read_text(encoding='utf-8')

          def remove_to_next(text: str, start_marker: str, end_marker: str, label: str, *, skip: int = 0) -> str:
              start = text.find(start_marker)
              if start < 0:
                  raise SystemExit(f'{label} start was not found')
              end = text.find(end_marker, start + len(start_marker))
              if end < 0:
                  raise SystemExit(f'{label} end was not found')
              return text[:start] + text[end + skip:]

          text = remove_to_next(
              text,
              '''replace_once(
              bootstrap,
              """async function atomicInventory(payload) {''',
              '\n\nreplace_once(',
              'atomicInventory patch block',
              skip=2,
          )
          text = remove_to_next(
              text,
              '''regex_once(
              bootstrap,
              r"  const adminProfile = profile\\('tenant-admin'\\);''',
              '\nreplace_once(\n    bootstrap,\n    """    for (const session of [',
              'legacy loadContext patch block',
          )
          text = remove_to_next(
              text,
              '''replace_once(
              bootstrap,
              """    for (const session of [''',
              '\n\ntest = "tests/staging-fixture-bootstrap-assets.test.ts"',
              'legacy session cleanup patch block',
              skip=2,
          )
          patch.write_text(text, encoding='utf-8')
          PY

          python3 tools/.tmp-apply-bootstrap-configuration-approver.py

          python3 - <<'PY'
          from pathlib import Path
          import re

          target = Path('ops/staging-fixture-bootstrap.mjs')
          text = target.read_text(encoding='utf-8')

          pattern = r"async function atomicInventory\(payload\) \{.*?\n\}\n\nasync function applyPlan"
          replacement = """async function atomicInventory(payload) {
            await writePrivateJson(INVENTORY_PATH, payload);
          }

          async function applyPlan"""
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)
          if count != 1:
              raise SystemExit(f'atomicInventory source replacement count={count}')

          old = """  const adminProfile = profile('tenant-admin');
          const managerProfile = profile('incident-manager');
          const serviceDeskProfile = profile('service-desk-agent');
          if (!adminProfile || !managerProfile || !serviceDeskProfile) {
            throw new BootstrapError(
              'ACTOR_PROFILE_MISSING',
              'Required staging actor profiles are unavailable.',
            );
          }
          const tenantId = requireUuid('fixture tenant', adminProfile.tenantId);
          for (const actor of [adminProfile, managerProfile, serviceDeskProfile]) {
            if (!actor.credentialRef || actor.tenantId !== tenantId) {
              throw new BootstrapError(
                'ACTOR_PROFILE_INVALID',
                'A required staging actor profile is invalid.',
              );
            }
          }
          const sessions = {
            admin: await login(baseUrl, adminProfile, tenantId),
            manager: await login(baseUrl, managerProfile, tenantId),
            serviceDesk: await login(baseUrl, serviceDeskProfile, tenantId),
          };
          return { baseUrl, tenantId, sessions };
          """
          new = """  const adminProfile = profile('tenant-admin');
          const serviceDeskProfile = profile('service-desk-agent');
          if (!adminProfile || !serviceDeskProfile) {
            throw new BootstrapError(
              'ACTOR_PROFILE_MISSING',
              'Required staging actor profiles are unavailable.',
            );
          }
          const tenantId = requireUuid('fixture tenant', adminProfile.tenantId);
          for (const actor of [adminProfile, serviceDeskProfile]) {
            if (!actor.credentialRef || actor.tenantId !== tenantId) {
              throw new BootstrapError(
                'ACTOR_PROFILE_INVALID',
                'A required staging actor profile is invalid.',
              );
            }
          }
          const sessions = {
            admin: await login(baseUrl, adminProfile, tenantId),
            serviceDesk: await login(baseUrl, serviceDeskProfile, tenantId),
          };
          return { baseUrl, tenantId, sessions };
          """
          if text.count(old) != 1:
              raise SystemExit(f'loadContext source replacement count={text.count(old)}')
          text = text.replace(old, new, 1)
          target.write_text(text, encoding='utf-8')
          PY

          rm -f \
            tools/.tmp-apply-bootstrap-configuration-approver.py \
            .github/workflows/one-shot-config-approver-v7.yml

          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check

          python3 - <<'PY'
          import subprocess

          allowed = {
              '.github/workflows/one-shot-config-approver-v7.yml',
              'docs/operations/STAGING_FIXTURE_BOOTSTRAP.md',
              'ops/staging-fixture-bootstrap.mjs',
              'tests/staging-fixture-bootstrap-assets.test.ts',
          }
          changed = {
              line[3:]
              for line in subprocess.check_output(
                  ['git', 'status', '--short'], text=True
              ).splitlines()
              if len(line) >= 4
          }
          unexpected = sorted(changed - allowed)
          required = {
              'docs/operations/STAGING_FIXTURE_BOOTSTRAP.md',
              'ops/staging-fixture-bootstrap.mjs',
              'tests/staging-fixture-bootstrap-assets.test.ts',
          }
          missing = sorted(required - changed)
          if unexpected or missing:
              raise SystemExit(
                  f'unexpected={unexpected}; missing_required={missing}; changed={sorted(changed)}'
              )
          PY

          git add \
            .github/workflows/one-shot-config-approver-v7.yml \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          git commit -m 'fix: provision distinct governed SLA configuration approver'
          git push --force-with-lease origin HEAD:fix/bootstrap-configuration-approver-clean
      - name: Upload sanitized patch diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: config-approver-apply-diagnostic
          path: /tmp/config-approver-apply.log
          if-no-files-found: error
          retention-days: 1
      - name: Propagate patch failure
        if: steps.apply.outcome != 'success'
        run: exit 1
