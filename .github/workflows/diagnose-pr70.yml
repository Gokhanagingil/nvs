name: diagnose PR 70

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-pr70.yml
      - .github/workflows/one-shot-format-configuration-approver-patch.yml
      - .github/workflows/one-shot-patch-configuration-approver-domain-access.yml

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Identify first failing CI stage
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch "$HEAD_REF" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          corepack enable
          corepack pnpm install --frozen-lockfile --reporter=silent

          stage='PASS'
          output='All diagnostic stages passed.'
          if ! corepack pnpm format:check >/tmp/nvs-stage.log 2>&1; then
            stage='FORMAT_CHECK'
            output="$(tail -n 20 /tmp/nvs-stage.log)"
          elif ! corepack pnpm lint >/tmp/nvs-stage.log 2>&1; then
            stage='LINT'
            output="$(tail -n 20 /tmp/nvs-stage.log)"
          elif ! corepack pnpm typecheck >/tmp/nvs-stage.log 2>&1; then
            stage='TYPECHECK'
            output="$(tail -n 20 /tmp/nvs-stage.log)"
          fi

          body="$RUNNER_TEMP/pr70-diagnostic.md"
          {
            echo '<!-- nvs-pr70-diagnostic -->'
            echo '## Sanitized PR #70 diagnostic'
            echo
            echo "- First failing stage: \`$stage\`"
            echo '- Staging operation: none'
            echo '- Live Incident acceptance: not executed'
            echo
            echo '```text'
            printf '%s\n' "$output"
            echo '```'
          } > "$body"
          gh issue comment 23 --repo "$GITHUB_REPOSITORY" --body-file "$body"
          [[ "$stage" == 'PASS' ]]
