name: diagnose current staging fixture plan

on:
  push:
    branches:
      - diagnose/staging-fixture-plan
    paths:
      - .github/workflows/diagnose-staging-fixture-plan.yml

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - name: Check out reviewed main tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Configure pinned SSH trust
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          SSH_KEY_B64: ${{ secrets.NVS_STAGING_SSH_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.NVS_STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]{0,31}$ ]]
          install -d -m 0700 "$HOME/.ssh"
          printf '%s' "$SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/id_nvs_staging"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_nvs_staging" "$HOME/.ssh/known_hosts"

      - name: Run sanitized read-only plan and publish the diagnostic
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="${SSH_USER}@${SSH_HOST}"
          remote_dir="/tmp/nvs-staging-fixture-diagnostic-${RUN_ID}-${RUN_ATTEMPT}"
          output_file="$RUNNER_TEMP/nvs-staging-fixture-diagnostic.md"
          comment_file="$RUNNER_TEMP/nvs-staging-fixture-comment.md"

          ssh "${ssh_options[@]}" "$remote" "install -d -m 0700 '$remote_dir'"
          scp "${ssh_options[@]}" \
            ops/staging-fixture-discovery.mjs \
            ops/staging-fixture-plan.py \
            "${remote}:${remote_dir}/"

          set +e
          ssh "${ssh_options[@]}" "$remote" \
            "python3 '$remote_dir/staging-fixture-plan.py' --environment-id staging-example --assignment-group-query 'service desk' --service-query payment --offering-query payment --ci-query payment --discovery-script '$remote_dir/staging-fixture-discovery.mjs'" \
            >"$output_file"
          status=$?
          set -e

          {
            echo '## Automated staging fixture plan diagnostic'
            echo
            echo 'This comment contains only the sanitized browser-operator result. No UUID, candidate label, credential, bearer token, or raw NILES payload is included.'
            echo
            cat "$output_file"
          } > "$comment_file"

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/9/comments" \
            --raw-field "body=$(cat "$comment_file")" \
            >/dev/null

          ssh "${ssh_options[@]}" "$remote" "rm -rf '$remote_dir'" || true
          rm -rf "$HOME/.ssh"
          exit "$status"
