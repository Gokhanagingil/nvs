name: format PR18 operator diagnostics

on:
  push:
    branches:
      - fix/staging-fixture-diagnostics-artifact
    paths:
      - .github/workflows/format-pr18.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/staging-fixture-diagnostics-artifact
          persist-credentials: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format changed files and remove helper
        run: |
          pnpm exec prettier --write \
            .github/workflows/staging-fixture.yml \
            tests/staging-fixture-diagnostics-assets.test.ts
          rm -f .github/workflows/format-pr18.yml
          git config user.name "nvs-maintenance-bot"
          git config user.email "nvs-maintenance-bot@users.noreply.github.com"
          git add -A
          git commit -m "style: format staging fixture diagnostics"
          git push origin HEAD:fix/staging-fixture-diagnostics-artifact
