name: one-shot analyze staging bootstrap readiness

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-analyze-staging-bootstrap-readiness.yml

permissions:
  contents: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Configure pinned SSH trust
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          SSH_KEY_B64: ${{ secrets.NVS_STAGING_SSH_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.NVS_STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 0700 "$HOME/.ssh"
          printf '%s' "$SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/id_nvs_staging"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_nvs_staging" "$HOME/.ssh/known_hosts"

      - name: Query only read-only bootstrap surfaces
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ssh_options=(-i "$HOME/.ssh/id_nvs_staging" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          remote="${SSH_USER}@${SSH_HOST}"
          remote_dir="/tmp/nvs-bootstrap-readiness-${RUN_ID}"
          result_file="$RUNNER_TEMP/bootstrap-readiness.json"
          report_file="$RUNNER_TEMP/bootstrap-readiness.md"

          cat > "$RUNNER_TEMP/bootstrap-readiness.mjs" <<'NODE'
          import { readdir, readFile } from 'node:fs/promises';
          import path from 'node:path';

          const CONFIG_DIR = process.env.NVS_CONFIG_DIR || '/app/config';
          const environmentId = 'staging-example';
          const timeoutMs = 8000;
          const asRecord = (value) => value && typeof value === 'object' && !Array.isArray(value) ? value : undefined;
          const unwrap = (value) => {
            const root = asRecord(value);
            return root && Object.prototype.hasOwnProperty.call(root, 'data') ? root.data : value;
          };
          const items = (value, key = 'items') => {
            const payload = unwrap(value);
            if (Array.isArray(payload)) return payload;
            const record = asRecord(payload);
            return Array.isArray(record?.[key]) ? record[key] : [];
          };
          const scalar = (raw) => {
            const value = raw.trim();
            if ((value.startsWith("'") && value.endsWith("'")) || (value.startsWith('"') && value.endsWith('"'))) return value.slice(1, -1);
            if (value === 'true') return true;
            if (value === 'false') return false;
            return value;
          };
          const parseTop = (text) => Object.fromEntries(text.split(/\r?\n/u).flatMap((line) => {
            if (!line || /^\s/u.test(line) || /^\s*#/u.test(line)) return [];
            const match = /^([A-Za-z0-9_-]+):(?:\s*(.*))?$/u.exec(line);
            return match ? [[match[1], scalar(match[2] || '')]] : [];
          }));
          async function yamlDir(directory) {
            const result = [];
            for (const entry of await readdir(directory, { withFileTypes: true })) {
              if (!entry.isFile() || !/\.ya?ml$/iu.test(entry.name)) continue;
              result.push(parseTop(await readFile(path.join(directory, entry.name), 'utf8')));
            }
            return result;
          }
          const credentialName = (reference) => `NVS_CREDENTIAL_${[...reference].map((character) => character === '.' ? '_DOT_' : character === '-' ? '_DASH_' : character.toUpperCase()).join('')}`;
          const credential = (reference) => {
            const raw = process.env[credentialName(reference)];
            if (!raw) throw new Error('credential missing');
            const parsed = JSON.parse(raw.replace(/^['"]|['"]$/gu, ''));
            if (!parsed.email || !parsed.password) throw new Error('credential invalid');
            return parsed;
          };
          async function request(url, init = {}) {
            const response = await fetch(url, { ...init, signal: AbortSignal.timeout(timeoutMs) });
            let body;
            try { body = await response.json(); } catch { body = undefined; }
            if (!response.ok) throw new Error(`HTTP_${response.status}`);
            return body;
          }
          const environments = await yamlDir(path.join(CONFIG_DIR, 'environments'));
          const environment = environments.find((candidate) => candidate.id === environmentId);
          if (!environment?.baseUrl) throw new Error('environment missing');
          const profiles = await yamlDir(path.join(CONFIG_DIR, 'actors', 'profiles'));
          const byPersona = (persona) => profiles.find((candidate) => candidate.environmentId === environmentId && candidate.persona === persona && candidate.enabled !== false);
          const adminProfile = byPersona('tenant-admin');
          const managerProfile = byPersona('incident-manager');
          if (!adminProfile?.tenantId || !adminProfile?.credentialRef || !managerProfile?.credentialRef) throw new Error('actor profile missing');
          async function login(profile) {
            const secret = credential(profile.credentialRef);
            const payload = unwrap(await request(new URL('/auth/login', environment.baseUrl), {
              method: 'POST', headers: { accept: 'application/json', 'content-type': 'application/json' },
              body: JSON.stringify({ email: secret.email, password: secret.password }),
            }));
            const record = asRecord(payload);
            const user = asRecord(record?.user);
            if (!record?.accessToken || user?.tenantId !== adminProfile.tenantId) throw new Error('login invalid');
            return { token: record.accessToken, userId: user.id };
          }
          const admin = await login(adminProfile);
          const manager = await login(managerProfile);
          const headers = (session) => ({ accept: 'application/json', authorization: `Bearer ${session.token}`, 'x-tenant-id': adminProfile.tenantId });
          const base = environment.baseUrl;
          const [classesPayload, writesPayload, policiesPayload, definitionsPayload, managerPoliciesPayload] = await Promise.all([
            request(new URL('/grc/cmdb/classes?page=1&pageSize=100', base), { headers: headers(admin) }),
            request(new URL('/grc/itsm/sla/governed/writes-enabled', base), { headers: headers(admin) }),
            request(new URL('/grc/itsm/sla/governed/policies', base), { headers: headers(admin) }),
            request(new URL('/grc/itsm/sla/definitions?page=1&pageSize=100', base), { headers: headers(admin) }),
            request(new URL('/grc/itsm/sla/governed/policies', base), { headers: headers(manager) }),
          ]);
          const writes = asRecord(unwrap(writesPayload));
          const policies = asRecord(unwrap(policiesPayload));
          const managerPolicies = asRecord(unwrap(managerPoliciesPayload));
          console.log(JSON.stringify({
            schemaVersion: 'nvs.staging-bootstrap-readiness/v1',
            adminAuthenticated: Boolean(admin.userId),
            managerAuthenticated: Boolean(manager.userId),
            ciClassCount: items(classesPayload).length,
            governedWritesEnabled: writes?.writesEnabled === true,
            governedPolicyCount: Array.isArray(policies?.policies) ? policies.policies.length : 0,
            managerCanReadGovernedPolicies: Array.isArray(managerPolicies?.policies),
            legacyDefinitionCount: items(definitionsPayload).length,
          }));
          NODE

          ssh "${ssh_options[@]}" "$remote" "install -d -m 0700 '$remote_dir'"
          scp "${ssh_options[@]}" "$RUNNER_TEMP/bootstrap-readiness.mjs" "${remote}:${remote_dir}/"
          ssh "${ssh_options[@]}" "$remote" "docker exec -i nvs node --input-type=module - < '$remote_dir/bootstrap-readiness.mjs'" > "$result_file"
          ssh "${ssh_options[@]}" "$remote" "rm -rf '$remote_dir'" || true

          python3 - "$result_file" "$report_file" <<'PY'
          import json, sys
          from pathlib import Path
          data = json.loads(Path(sys.argv[1]).read_text(encoding='utf-8'))
          lines = [
              '# Sanitized staging fixture bootstrap readiness',
              '',
              'No live identifier, credential, token, or raw payload is included.',
              '',
              f'- Tenant admin authenticated: `{str(bool(data.get("adminAuthenticated"))).lower()}`',
              f'- Incident manager authenticated: `{str(bool(data.get("managerAuthenticated"))).lower()}`',
              f'- Existing CI classes: `{data.get("ciClassCount", 0)}`',
              f'- Governed SLA writes enabled: `{str(bool(data.get("governedWritesEnabled"))).lower()}`',
              f'- Existing governed SLA policies: `{data.get("governedPolicyCount", 0)}`',
              f'- Incident manager can read governed SLA policies: `{str(bool(data.get("managerCanReadGovernedPolicies"))).lower()}`',
              f'- Existing legacy SLA definitions: `{data.get("legacyDefinitionCount", 0)}`',
          ]
          Path(sys.argv[2]).write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          gh issue edit 23 --repo "$GITHUB_REPOSITORY" --title '[Closed] Sanitized staging fixture bootstrap readiness' --body-file "$report_file"

      - name: Remove temporary material and workflow
        if: always()
        run: |
          set -euo pipefail
          rm -rf "$HOME/.ssh"
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-analyze-staging-bootstrap-readiness.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-analyze-staging-bootstrap-readiness.yml
          git commit -m 'chore: remove completed bootstrap readiness analyzer'
          git push origin HEAD:main
