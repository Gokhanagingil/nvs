name: one-shot apply configuration approver bootstrap patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-apply-bootstrap-configuration-approver.yml

permissions:
  contents: write

concurrency:
  group: nvs-one-shot-configuration-approver-patch
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out the implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-configuration-approver
          persist-credentials: true
          fetch-depth: 0

      - name: Install pinned toolchain
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - name: Install pinned Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Apply and verify the deterministic patch
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          python3 tools/apply-bootstrap-configuration-approver-v2.py
          rm -f \
            tools/apply-bootstrap-configuration-approver.py \
            tools/apply-bootstrap-configuration-approver-v2.py
          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check

      - name: Push only the reviewed implementation change
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git status --short
          git add \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md \
            tools/apply-bootstrap-configuration-approver.py \
            tools/apply-bootstrap-configuration-approver-v2.py
          git commit -m 'fix: provision a distinct governed SLA configuration approver'
          git push origin HEAD:fix/bootstrap-configuration-approver

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove the completed temporary workflow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Commit cleanup
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-apply-bootstrap-configuration-approver.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-apply-bootstrap-configuration-approver.yml
          git commit -m 'chore: remove completed configuration approver patch workflow'
          git push origin HEAD:main
