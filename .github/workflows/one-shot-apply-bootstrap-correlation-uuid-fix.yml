name: one-shot apply bootstrap correlation UUID fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-apply-bootstrap-correlation-uuid-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out target implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-audit-correlation-uuid
          persist-credentials: true
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Apply and validate the deterministic source fix
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          python3 tools/apply-bootstrap-correlation-uuid-fix.py
          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          git diff --check

      - name: Push only the implementation fix
        run: |
          set -euo pipefail
          rm -f tools/apply-bootstrap-correlation-uuid-fix.py
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git add -A
          git commit -m 'fix: use UUID correlation IDs for audited bootstrap writes'
          git push origin HEAD:fix/bootstrap-audit-correlation-uuid

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove this one-shot workflow after a successful patch
        if: needs.patch.result == 'success'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Commit self-removal
        if: needs.patch.result == 'success'
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          rm -f .github/workflows/one-shot-apply-bootstrap-correlation-uuid-fix.yml
          git add .github/workflows/one-shot-apply-bootstrap-correlation-uuid-fix.yml
          git commit -m 'chore: remove completed bootstrap correlation fixer'
          git push origin HEAD:main
