name: one-shot apply corrected configuration approver patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-apply-configuration-approver-v3.yml

permissions:
  contents: write

concurrency:
  group: nvs-one-shot-configuration-approver-v3
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-configuration-approver
          persist-credentials: true
          fetch-depth: 0

      - name: Bring implementation branch onto current main
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main

      - name: Correct escaped newline in deterministic patch
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/apply-bootstrap-configuration-approver-v2.py')
          text = path.read_text(encoding='utf-8')
          old = "   await writeFile(temporary, `${JSON.stringify(payload, null, 2)}\\n`, {"
          if text.count(old) != 1:
              raise SystemExit(f'expected one escaped-newline patch target, found {text.count(old)}')
          path.write_text(text.replace(old, "   await writeFile(temporary, `${JSON.stringify(payload, null, 2)}\\\\n`, {", 1), encoding='utf-8')
          PY

      - name: Apply and verify corrected deterministic patch
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          python3 tools/apply-bootstrap-configuration-approver-v2.py
          rm -f \
            tools/apply-bootstrap-configuration-approver.py \
            tools/apply-bootstrap-configuration-approver-v2.py \
            .github/workflows/one-shot-finalize-configuration-approver.yml
          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check

      - name: Push implementation result
        run: |
          set -euo pipefail
          git status --short
          git add -A
          if git diff --cached --quiet --exit-code; then
            echo 'No implementation changes produced.' >&2
            exit 1
          fi
          git commit -m 'fix: provision a distinct governed SLA configuration approver'
          git push origin HEAD:fix/bootstrap-configuration-approver

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove temporary workflow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Commit cleanup
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-apply-configuration-approver-v3.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-apply-configuration-approver-v3.yml
          git commit -m 'chore: remove completed configuration approver v3 workflow'
          git push origin HEAD:main
