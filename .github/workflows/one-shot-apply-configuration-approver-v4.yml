name: one-shot apply configuration approver patch v4

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-apply-configuration-approver-v4.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-configuration-approver
          persist-credentials: true
          fetch-depth: 0

      - name: Merge current main
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main

      - name: Correct deterministic patch matcher
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/apply-bootstrap-configuration-approver-v2.py')
          text = path.read_text(encoding='utf-8')
          old = r"JSON.stringify(payload, null, 2)}\n`, {"
          new = r"JSON.stringify(payload, null, 2)}\\n`, {"
          count = text.count(old)
          print(f'escaped_newline_matcher_count={count}')
          if count != 1:
              raise SystemExit(f'expected one escaped-newline matcher, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply and verify patch
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          python3 tools/apply-bootstrap-configuration-approver-v2.py
          rm -f \
            tools/apply-bootstrap-configuration-approver.py \
            tools/apply-bootstrap-configuration-approver-v2.py \
            .github/workflows/one-shot-finalize-configuration-approver.yml \
            .github/workflows/one-shot-gate-config-approver-ops-pr.yml \
            .github/workflows/one-shot-diagnose-configuration-approver-v3.yml
          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check

      - name: Commit and push implementation
        run: |
          set -euo pipefail
          git add -A
          git commit -m 'fix: provision a distinct governed SLA configuration approver'
          git push origin HEAD:fix/bootstrap-configuration-approver

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f \
            .github/workflows/one-shot-apply-configuration-approver-v4.yml \
            .github/workflows/one-shot-gate-config-approver-ops-pr.yml \
            .github/workflows/one-shot-diagnose-configuration-approver-v3.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows
          git commit -m 'chore: remove completed configuration approver temporary workflows'
          git push origin HEAD:main
