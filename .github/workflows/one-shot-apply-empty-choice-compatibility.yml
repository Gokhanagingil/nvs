name: one-shot apply empty choice-catalog compatibility

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write

jobs:
  patch:
    if: >-
      github.event.issue.number == 23 &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == github.repository_owner &&
      github.event.comment.body == 'APPLY_REVIEWED_CHOICE_COMPATIBILITY_PATCH'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out target implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/empty-choice-catalog-compatibility
          persist-credentials: true
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Apply, format, and validate the compatibility patch
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/choice-compatibility-patch.log"
          {
            set -euo pipefail
            pnpm install --frozen-lockfile
            python3 tools/apply-empty-choice-catalog-compatibility.py
            pnpm exec prettier --write \
              packages/core/src/index.ts \
              packages/adapter-niles/src/index.ts \
              ops/staging-fixture-bootstrap.mjs \
              ops/staging-fixture-discovery.mjs \
              tests/live-incident.test.ts \
              tests/staging-fixture-plan-selection.test.ts \
              tests/staging-fixture-bootstrap-assets.test.ts \
              tests/niles-incident-adapter.test.ts \
              tests/staging-operator-assets.test.ts \
              docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
            python3 -m py_compile ops/staging-fixture-plan.py
            node --check ops/staging-fixture-bootstrap.mjs
            node --check ops/staging-fixture-discovery.mjs
            pnpm exec tsc --noEmit
            pnpm exec eslint \
              packages/core/src/index.ts \
              packages/adapter-niles/src/index.ts \
              ops/staging-fixture-bootstrap.mjs \
              ops/staging-fixture-discovery.mjs \
              tests/live-incident.test.ts \
              tests/staging-fixture-plan-selection.test.ts \
              tests/staging-fixture-bootstrap-assets.test.ts \
              tests/niles-incident-adapter.test.ts \
              tests/staging-operator-assets.test.ts
            pnpm exec vitest run \
              tests/live-incident.test.ts \
              tests/niles-incident-adapter.test.ts \
              tests/staging-fixture-plan-selection.test.ts \
              tests/staging-fixture-bootstrap-assets.test.ts \
              tests/staging-operator-assets.test.ts
            git diff --check
          } 2>&1 | tee "$log"

      - name: Publish sanitized failure diagnostics
        if: steps.patch.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/choice-compatibility-patch.log"
          safe="$RUNNER_TEMP/choice-compatibility-patch-safe.log"
          tail -n 220 "$log" \
            | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
            > "$safe"
          body="$RUNNER_TEMP/choice-compatibility-patch-failure.md"
          {
            echo '## Reviewed choice-compatibility patch failed'
            echo
            echo 'The implementation branch was not pushed. Sanitized diagnostic tail:'
            echo
            echo '```text'
            cat "$safe"
            echo '```'
          } > "$body"
          gh issue comment 23 --repo "$GITHUB_REPOSITORY" --body-file "$body"

      - name: Push only the implementation change
        if: steps.patch.outcome == 'success'
        run: |
          set -euo pipefail
          rm -f tools/apply-empty-choice-catalog-compatibility.py
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git add -A
          git commit -m 'fix: support NILES product-default choice contracts'
          git push origin HEAD:fix/empty-choice-catalog-compatibility

      - name: Preserve failed job conclusion
        if: steps.patch.outcome == 'failure'
        run: exit 1

  cleanup:
    needs: patch
    if: needs.patch.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main for self-removal
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Remove this one-shot workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          rm -f .github/workflows/one-shot-apply-empty-choice-compatibility.yml
          git add .github/workflows/one-shot-apply-empty-choice-compatibility.yml
          git commit -m 'chore: remove completed choice-compatibility fixer'
          git push origin HEAD:main
