name: one-shot apply legacy assignment patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-apply-legacy-assignment-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out target implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/staging-fixture-legacy-label-assignment
          persist-credentials: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply, format, and validate the branch patch
        run: |
          set -euo pipefail
          python3 tools/apply-legacy-assignment-patch.py
          python3 - <<'PY'
          from pathlib import Path

          planner = Path('ops/staging-fixture-plan.py')
          planner_text = planner.read_text(encoding='utf-8')
          marker = 'def _assignment_selection(item: dict[str, Any], mode: str) -> dict[str, Any]:'
          start = planner_text.find(marker)
          if start < 0:
              raise SystemExit('generated assignment selection helper was not found')
          end = planner_text.find('\n\ndef _run', start)
          if end < 0:
              raise SystemExit('generated assignment selection helper boundary was not found')
          block = planner_text[start:end]
          fixed = block.replace('\\"', '"')
          if fixed == block:
              raise SystemExit('generated assignment selection helper did not contain the reviewed escape defect')
          planner.write_text(planner_text[:start] + fixed + planner_text[end:], encoding='utf-8')

          core = Path('packages/core/src/index.ts')
          core_text = core.read_text(encoding='utf-8')
          old = """                return {
                  ...transportObservation(incident.transport),
                  incidentId: incident.id,
                  assignmentBindingMode: assignmentBinding.mode,
                  assignmentGroupId: incident.assignmentGroupId ?? null,
                  assignmentGroup: incident.assignmentGroup ?? null,
                };
"""
          new = """                return {
                  ...transportObservation(incident.transport),
                  incidentId: incident.id,
                  assignmentBindingMode: assignmentBinding.mode,
                  assignmentGroupId: incident.assignmentGroupId ?? null,
                  assignmentGroup: incident.assignmentGroup ?? null,
                  expectedAssignmentGroupId:
                    assignmentBinding.mode === 'CANONICAL_ID'
                      ? assignmentBinding.assignmentGroupId
                      : null,
                  expectedAssignmentGroup:
                    assignmentBinding.mode === 'LEGACY_LABEL'
                      ? assignmentBinding.assignmentGroup
                      : null,
                };
"""
          if core_text.count(old) != 1:
              raise SystemExit('generated successful assignment evidence block was not found exactly once')
          core.write_text(core_text.replace(old, new, 1), encoding='utf-8')
          PY
          pnpm exec prettier --write \
            packages/contracts/src/index.ts \
            packages/core/src/index.ts \
            packages/adapter-niles/src/index.ts \
            fixtures/niles-incident/staging.example.yaml \
            tests/live-incident.test.ts \
            tests/staging-fixture-plan-selection.test.ts \
            docs/operations/STAGING_BROWSER_OPERATOR.md
          python3 -m py_compile \
            ops/staging-fixture-plan.py \
            ops/staging-fixture-apply.py
          node --check ops/staging-fixture-discovery.mjs
          pnpm exec tsc --noEmit
          pnpm exec vitest run \
            tests/live-incident.test.ts \
            tests/staging-fixture-plan-selection.test.ts \
            tests/staging-operator-assets.test.ts
      - name: Remove temporary branch machinery and push implementation
        run: |
          set -euo pipefail
          rm -f \
            tools/apply-legacy-assignment-patch.py \
            .github/workflows/apply-legacy-assignment-patch.yml
          git config user.name "nvs-maintenance-bot"
          git config user.email "nvs-maintenance-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: support legacy assignment labels when staging has no groups"
          git push origin HEAD:fix/staging-fixture-legacy-label-assignment
