name: one-shot complete configuration approver bootstrap

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-complete-configuration-approver-bootstrap.yml

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: nvs-one-shot-complete-configuration-approver-bootstrap
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      IMPLEMENTATION_PR: '72'
      IMPLEMENTATION_HEAD_SHA: 6ee79698c9894d798aa6bbfd1fc3c197c1b9a0b3
      SUCCESSFUL_DEPLOY_RUN: '29540003136'
      ENVIRONMENT_ID: staging-example
      SELF_PATH: .github/workflows/one-shot-complete-configuration-approver-bootstrap.yml
    steps:
      - name: Validate reviewed implementation, clean tree, CI proof, and exact-SHA deployment
        id: preflight
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          pr_json="$RUNNER_TEMP/pr.json"
          runs_json="$RUNNER_TEMP/runs.json"
          jobs_json="$RUNNER_TEMP/jobs.json"
          deploy_json="$RUNNER_TEMP/deploy.json"
          deploy_jobs_json="$RUNNER_TEMP/deploy-jobs.json"
          deploy_log="$RUNNER_TEMP/deploy.log"
          compare_json="$RUNNER_TEMP/compare.json"

          gh api "repos/$repo/pulls/$IMPLEMENTATION_PR" > "$pr_json"
          [[ "$(jq -r '.merged' "$pr_json")" == 'true' ]]
          [[ "$(jq -r '.head.sha' "$pr_json")" == "$IMPLEMENTATION_HEAD_SHA" ]]
          [[ "$(jq -r '.merge_commit_sha' "$pr_json")" == "$TARGET_SHA" ]]
          merged_at="$(jq -r '.merged_at' "$pr_json")"

          gh api "repos/$repo/actions/runs?head_sha=$IMPLEMENTATION_HEAD_SHA&event=pull_request&per_page=100" > "$runs_json"
          ci_run="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].id // empty' "$runs_json")"
          [[ "$ci_run" =~ ^[0-9]+$ ]]
          [[ "$(jq -r --argjson id "$ci_run" '.workflow_runs[] | select(.id == $id) | .conclusion' "$runs_json")" == 'success' ]]
          ci_updated_at="$(jq -r --argjson id "$ci_run" '.workflow_runs[] | select(.id == $id) | .updated_at' "$runs_json")"
          gh api "repos/$repo/actions/runs/$ci_run/jobs?filter=latest&per_page=100" > "$jobs_json"
          for step in \
            'Build exact production image' \
            'Prove bind mounts, read-only root, and ownership readiness' \
            'Prove deploy rollback, same-SHA reference, and archive checksum'; do
            [[ "$(jq -r --arg step "$step" '[.jobs[].steps[] | select(.name == $step)][0].conclusion // "missing"' "$jobs_json")" == 'success' ]]
          done

          chronology='PASS'
          if [[ "$ci_updated_at" > "$merged_at" ]]; then
            chronology='FAIL'
          fi

          gh api "repos/$repo/compare/$TARGET_SHA...main" > "$compare_json"
          mapfile -t changed < <(jq -r '.files[].filename' "$compare_json")
          [[ "${#changed[@]}" -eq 1 ]]
          [[ "${changed[0]}" == "$SELF_PATH" ]]

          mapfile -t one_shots < <(gh api "repos/$repo/contents/.github/workflows?ref=main" --jq '.[].name' | grep '^one-shot-' || true)
          [[ "${#one_shots[@]}" -eq 1 ]]
          [[ "${one_shots[0]}" == "${SELF_PATH##*/}" ]]

          if gh api "repos/$repo/git/ref/heads/fix/bootstrap-configuration-approver" >/dev/null 2>&1; then
            echo 'Unexpected stale branch fix/bootstrap-configuration-approver exists.' >&2
            exit 1
          fi

          gh api "repos/$repo/actions/runs/$SUCCESSFUL_DEPLOY_RUN" > "$deploy_json"
          [[ "$(jq -r '.name' "$deploy_json")" == 'deploy staging' ]]
          [[ "$(jq -r '.event' "$deploy_json")" == 'workflow_dispatch' ]]
          [[ "$(jq -r '.conclusion' "$deploy_json")" == 'success' ]]
          gh api "repos/$repo/actions/runs/$SUCCESSFUL_DEPLOY_RUN/jobs?filter=latest&per_page=100" > "$deploy_jobs_json"
          for step in \
            'Run required quality gate' \
            'Build immutable deployment archive' \
            'Configure pinned SSH trust' \
            'Transfer and deploy exact image' \
            'Record deployment metadata'; do
            [[ "$(jq -r --arg step "$step" '[.jobs[].steps[] | select(.name == $step)][0].conclusion // "missing"' "$deploy_jobs_json")" == 'success' ]]
          done
          gh run view "$SUCCESSFUL_DEPLOY_RUN" --repo "$repo" --log > "$deploy_log"
          grep -Fq "Resolved $TARGET_SHA to $TARGET_SHA" "$deploy_log"

          echo "ci_run=$ci_run" >> "$GITHUB_OUTPUT"
          echo "ci_chronology=$chronology" >> "$GITHUB_OUTPUT"
          echo "merged_at=$merged_at" >> "$GITHUB_OUTPUT"
          echo "ci_updated_at=$ci_updated_at" >> "$GITHUB_OUTPUT"

      - name: Produce fresh deterministic plan
        id: plan
        if: steps.preflight.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion=''
          run_attempt='1'
          for _attempt in $(seq 1 180); do
            payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
            if [[ -n "$payload" ]]; then
              status="$(jq -r '.status' <<< "$payload")"
              conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
              run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
              if [[ "$status" == 'completed' ]]; then
                break
              fi
            fi
            sleep 5
          done
          [[ "$conclusion" == 'success' ]]
          result_dir="$RUNNER_TEMP/bootstrap-plan"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          for _attempt in $(seq 1 12); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then
              break
            fi
            sleep 5
          done
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          digest="$(sed -n 's/^- Bootstrap digest: `\([0-9a-f]\{64\}\)`$/\1/p' "$summary" | head -n 1)"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          allowed='^(CREATE_ASSIGNMENT_GROUP|ADD_SERVICE_DESK_MEMBER|CREATE_CI_CLASS|CREATE_CMDB_SERVICE|CREATE_CONFIGURATION_APPROVER|RECOVER_CONFIGURATION_APPROVER|CREATE_AND_PUBLISH_GOVERNED_SLA|COMPLETE_GOVERNED_SLA_PUBLISH|CREATE_SERVICE_OFFERING|CREATE_CONFIGURATION_ITEM|NONE_ALREADY_READY)$'
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -ge 1 ]]
          for action in "${actions[@]}"; do
            [[ "$action" =~ $allowed ]]
          done
          already_ready='false'
          if [[ "${#actions[@]}" -eq 1 && "${actions[0]}" == 'NONE_ALREADY_READY' ]]; then
            already_ready='true'
          fi
          cp "$summary" "$RUNNER_TEMP/bootstrap-plan.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "already_ready=$already_ready" >> "$GITHUB_OUTPUT"

      - name: Apply previously authorized deterministic fixtures
        id: apply
        if: steps.preflight.outcome == 'success' && steps.plan.outcome == 'success' && steps.plan.outputs.already_ready != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOOTSTRAP_DIGEST: ${{ steps.plan.outputs.digest }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          [[ "$BOOTSTRAP_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=apply \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest="$BOOTSTRAP_DIGEST" \
            --field confirmation=BOOTSTRAP_M1_02B_FIXTURES
          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion=''
          run_attempt='1'
          for _attempt in $(seq 1 180); do
            payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
            if [[ -n "$payload" ]]; then
              status="$(jq -r '.status' <<< "$payload")"
              conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
              run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
              if [[ "$status" == 'completed' ]]; then
                break
              fi
            fi
            sleep 5
          done
          [[ "$conclusion" == 'success' ]]
          result_dir="$RUNNER_TEMP/bootstrap-apply"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          for _attempt in $(seq 1 12); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then
              break
            fi
            sleep 5
          done
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          cp "$summary" "$RUNNER_TEMP/bootstrap-apply.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Verify final idempotent ready state
        id: verify
        if: steps.preflight.outcome == 'success' && steps.plan.outcome == 'success' && (steps.plan.outputs.already_ready == 'true' || steps.apply.outcome == 'success')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion=''
          run_attempt='1'
          for _attempt in $(seq 1 180); do
            payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
            if [[ -n "$payload" ]]; then
              status="$(jq -r '.status' <<< "$payload")"
              conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
              run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
              if [[ "$status" == 'completed' ]]; then
                break
              fi
            fi
            sleep 5
          done
          [[ "$conclusion" == 'success' ]]
          result_dir="$RUNNER_TEMP/bootstrap-verify"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          for _attempt in $(seq 1 12); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then
              break
            fi
            sleep 5
          done
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == 'NONE_ALREADY_READY' ]]
          cp "$summary" "$RUNNER_TEMP/bootstrap-verify.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Publish sanitized operation evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PREFLIGHT_OUTCOME: ${{ steps.preflight.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          CI_RUN: ${{ steps.preflight.outputs.ci_run }}
          CI_CHRONOLOGY: ${{ steps.preflight.outputs.ci_chronology }}
          MERGED_AT: ${{ steps.preflight.outputs.merged_at }}
          CI_UPDATED_AT: ${{ steps.preflight.outputs.ci_updated_at }}
          PLAN_RUN: ${{ steps.plan.outputs.run_id }}
          APPLY_RUN: ${{ steps.apply.outputs.run_id }}
          VERIFY_RUN: ${{ steps.verify.outputs.run_id }}
          ALREADY_READY: ${{ steps.plan.outputs.already_ready }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-bootstrap-completion.md"
          {
            echo '# Sanitized Configuration Approver bootstrap completion'
            echo
            echo "- Reviewed implementation PR: \`#$IMPLEMENTATION_PR\`"
            echo "- Implementation head SHA: \`$IMPLEMENTATION_HEAD_SHA\`"
            echo "- Merged/deployed exact SHA: \`$TARGET_SHA\`"
            echo "- Full PR CI run: \`${CI_RUN:-unavailable}\` — production image, hardening, rollback, same-SHA, and checksum proof passed"
            echo "- CI-before-merge chronology: \`${CI_CHRONOLOGY:-unavailable}\` (merge: \`${MERGED_AT:-unavailable}\`; CI completion: \`${CI_UPDATED_AT:-unavailable}\`)"
            echo "- Successful exact-SHA deploy run: \`$SUCCESSFUL_DEPLOY_RUN\`"
            echo "- Preflight: \`$PREFLIGHT_OUTCOME\`"
            echo "- Fresh plan run: \`${PLAN_RUN:-unavailable}\` — \`$PLAN_OUTCOME\`"
            if [[ "$ALREADY_READY" == 'true' ]]; then
              echo '- Authorized apply: not required; fresh plan was already fully ready'
            else
              echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\` — \`$APPLY_OUTCOME\`"
            fi
            echo "- Final idempotency verification run: \`${VERIFY_RUN:-unavailable}\` — \`$VERIFY_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- NILES mutation switch: verified not enabled by each staging-control run'
            echo '- Live Incident acceptance: not executed'
            echo
            for pair in \
              'Fresh plan:bootstrap-plan.md' \
              'Authorized apply:bootstrap-apply.md' \
              'Final verification:bootstrap-verify.md'; do
              title="${pair%%:*}"
              file="${pair#*:}"
              echo "## $title"
              echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then
                cat "$RUNNER_TEMP/$file"
              elif [[ "$title" == 'Authorized apply' && "$ALREADY_READY" == 'true' ]]; then
                echo '**Not required:** the fresh plan reported only `NONE_ALREADY_READY`.'
              else
                echo '**Sanitized artifact:** unavailable'
              fi
              echo
            done
          } > "$body"

          title='[Blocked] Configuration Approver bootstrap continuation failed'
          if [[ "$PREFLIGHT_OUTCOME" == 'success' && "$PLAN_OUTCOME" == 'success' && ( "$ALREADY_READY" == 'true' || "$APPLY_OUTCOME" == 'success' ) && "$VERIFY_OUTCOME" == 'success' ]]; then
            title='[Closed] Configuration Approver bootstrap completed'
          fi
          gh issue edit 23 --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body"

      - name: Enforce complete successful operation
        if: always()
        env:
          PREFLIGHT_OUTCOME: ${{ steps.preflight.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          ALREADY_READY: ${{ steps.plan.outputs.already_ready }}
        run: |
          set -euo pipefail
          [[ "$PREFLIGHT_OUTCOME" == 'success' ]]
          [[ "$PLAN_OUTCOME" == 'success' ]]
          if [[ "$ALREADY_READY" != 'true' ]]; then
            [[ "$APPLY_OUTCOME" == 'success' ]]
          fi
          [[ "$VERIFY_OUTCOME" == 'success' ]]

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed continuation workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-complete-configuration-approver-bootstrap.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-complete-configuration-approver-bootstrap.yml
          git commit -m 'chore: remove completed configuration approver bootstrap continuation workflow'
          git push origin HEAD:main
