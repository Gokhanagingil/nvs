name: one-shot configuration approver apply artifact poll

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-configuration-approver-apply-artifact-poll.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-configuration-approver-apply-artifact-poll
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RESULT_ISSUE: '80'
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      PLAN_RUN: '29541027249'
      BOOTSTRAP_DIGEST: 185340d0ad0a4776fdd5987f8141367e6ab4cbc7da0003a5aa35f4276407973c
      ENVIRONMENT_ID: staging-example
    steps:
      - name: Mark authorized apply started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/started.md" <<EOF
          # Configuration Approver finalizer execution

          - Status: \`RUNNING — artifact-polled authorized apply\`
          - Target SHA: \`$TARGET_SHA\`
          - Fresh sanitized plan run: \`$PLAN_RUN\` — \`PASS\`
          - Bootstrap digest: \`$BOOTSTRAP_DIGEST\`
          - Authorization: \`BOOTSTRAP_M1_02B_FIXTURES\`
          - NILES mutation switch: must remain disabled
          - Live Incident acceptance: not authorized and will not be executed
          EOF
          gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --title 'Configuration Approver finalizer running' --body-file "$RUNNER_TEMP/started.md"

      - name: Apply and verify through sanitized artifact polling
        id: execute
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"

          dispatch_and_collect() {
            local label="$1" operation="$2" digest="$3" confirmation="$4"
            local previous candidate run_id='' artifact_name artifact_count='0'
            previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            gh workflow run staging-fixture-bootstrap.yml \
              --repo "$repo" --ref main \
              --field operation="$operation" \
              --field environment_id="$ENVIRONMENT_ID" \
              --field expected_sha="$TARGET_SHA" \
              --field bootstrap_digest="$digest" \
              --field confirmation="$confirmation"
            for _attempt in $(seq 1 120); do
              sleep 2
              candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
              if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
            done
            [[ -n "$run_id" ]]
            printf '%s' "$run_id" > "$RUNNER_TEMP/${label}-run-id"
            artifact_name="nvs-staging-fixture-bootstrap-${run_id}-1"
            for _attempt in $(seq 1 180); do
              artifact_count="$(gh api "repos/$repo/actions/runs/$run_id/artifacts?per_page=100" --jq "[.artifacts[] | select(.name == \"$artifact_name\")] | length" 2>/dev/null || printf 0)"
              if [[ "$artifact_count" -ge 1 ]]; then break; fi
              sleep 2
            done
            [[ "$artifact_count" -ge 1 ]]
            local dir="$RUNNER_TEMP/$label"
            mkdir -p "$dir"
            gh run download "$run_id" --repo "$repo" --name "$artifact_name" --dir "$dir"
            local summary="$dir/nvs-staging-fixture-bootstrap.md"
            test -f "$summary"
            cp "$summary" "$RUNNER_TEMP/${label}.md"
            gh run view "$run_id" --repo "$repo" --json conclusion --jq '.conclusion // "unknown"' > "$RUNNER_TEMP/${label}-conclusion" 2>/dev/null || echo unknown > "$RUNNER_TEMP/${label}-conclusion"
            grep -Fq -- '- Result: `PASS`' "$summary"
          }

          [[ "$BOOTSTRAP_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          dispatch_and_collect apply apply "$BOOTSTRAP_DIGEST" BOOTSTRAP_M1_02B_FIXTURES
          dispatch_and_collect verify plan '' ''

          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$RUNNER_TEMP/verify.md")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == NONE_ALREADY_READY ]]
          touch "$RUNNER_TEMP/completed"

      - name: Publish dedicated sanitized result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTE_OUTCOME: ${{ steps.execute.outcome }}
        run: |
          set -euo pipefail
          read_value() { if [[ -s "$1" ]]; then cat "$1"; else printf unavailable; fi; }
          apply_run="$(read_value "$RUNNER_TEMP/apply-run-id")"
          verify_run="$(read_value "$RUNNER_TEMP/verify-run-id")"
          apply_conclusion="$(read_value "$RUNNER_TEMP/apply-conclusion")"
          verify_conclusion="$(read_value "$RUNNER_TEMP/verify-conclusion")"
          body="$RUNNER_TEMP/result.md"
          {
            echo '# Configuration Approver finalizer execution'
            echo
            echo "- Target SHA: \`$TARGET_SHA\`"
            echo "- Fresh sanitized plan run: \`$PLAN_RUN\` — \`PASS\`"
            echo "- Authorized apply run: \`$apply_run\` — workflow \`$apply_conclusion\`; sanitized result required \`PASS\`"
            echo "- Final verification run: \`$verify_run\` — workflow \`$verify_conclusion\`; sanitized result required \`PASS\` and \`NONE_ALREADY_READY\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- NILES mutation switch: verified not enabled by each staging-control run'
            echo '- Live Incident acceptance: not executed'
            for pair in 'Authorized apply:apply.md' 'Final verification:verify.md'; do
              title="${pair%%:*}"; file="${pair#*:}"
              echo; echo "## $title"; echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then cat "$RUNNER_TEMP/$file"; else echo '**Sanitized artifact:** unavailable'; fi
            done
          } > "$body"
          if [[ -f "$RUNNER_TEMP/completed" && "$EXECUTE_OUTCOME" == success ]]; then
            gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --title 'Configuration Approver finalizer completed' --body-file "$body"
            gh issue close "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed
          else
            gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --title 'Configuration Approver finalizer blocked' --body-file "$body"
          fi

      - name: Enforce successful completion
        if: always()
        run: test -f "$RUNNER_TEMP/completed"

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove artifact-poll execution workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-configuration-approver-apply-artifact-poll.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-configuration-approver-apply-artifact-poll.yml
          git commit -m 'chore: remove completed configuration approver artifact-poll workflow'
          git push origin HEAD:main
