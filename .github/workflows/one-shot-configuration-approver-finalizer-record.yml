name: one-shot configuration approver finalizer record

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-configuration-approver-finalizer-record.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-configuration-approver-finalizer-record
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RESULT_ISSUE: '80'
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      REVIEWED_CI_RUN: '29539983066'
      DEPLOY_RUN: '29540003136'
      ENVIRONMENT_ID: staging-example
    steps:
      - name: Mark execution started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/status.md" <<EOF
          # Configuration Approver finalizer execution

          - Status: \`RUNNING\`
          - Target SHA: \`$TARGET_SHA\`
          - Reviewed full CI run: \`$REVIEWED_CI_RUN\`
          - Successful exact-SHA deploy run: \`$DEPLOY_RUN\`
          - Authorization: \`BOOTSTRAP_M1_02B_FIXTURES\`
          - NILES mutation switch: must remain disabled
          - Live Incident acceptance: not authorized and will not be executed
          EOF
          gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/status.md"

      - name: Produce fresh exact-SHA plan
        id: plan
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          run_id=''
          for _attempt in $(seq 1 120); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status
          dir="$RUNNER_TEMP/plan"; mkdir -p "$dir"
          gh run download "$run_id" --repo "$repo" --name "nvs-staging-fixture-bootstrap-${run_id}-1" --dir "$dir"
          summary="$dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          digest="$(sed -n 's/^- Bootstrap digest: `\([0-9a-f]\{64\}\)`$/\1/p' "$summary" | head -n 1)"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          allowed='^(CREATE_ASSIGNMENT_GROUP|ADD_SERVICE_DESK_MEMBER|CREATE_CI_CLASS|CREATE_CMDB_SERVICE|CREATE_CONFIGURATION_APPROVER|RECOVER_CONFIGURATION_APPROVER|CREATE_AND_PUBLISH_GOVERNED_SLA|COMPLETE_GOVERNED_SLA_PUBLISH|CREATE_SERVICE_OFFERING|CREATE_CONFIGURATION_ITEM|NONE_ALREADY_READY)$'
          count=0
          while IFS= read -r action; do
            [[ -z "$action" || "$action" =~ $allowed ]]
            [[ -z "$action" ]] || count=$((count + 1))
          done < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "$count" -ge 1 ]]
          cp "$summary" "$RUNNER_TEMP/plan.md"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Apply authorized deterministic fixtures
        id: apply
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOOTSTRAP_DIGEST: ${{ steps.plan.outputs.digest }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          [[ "$BOOTSTRAP_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" --ref main \
            --field operation=apply \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest="$BOOTSTRAP_DIGEST" \
            --field confirmation=BOOTSTRAP_M1_02B_FIXTURES
          run_id=''
          for _attempt in $(seq 1 120); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status
          dir="$RUNNER_TEMP/apply"; mkdir -p "$dir"
          gh run download "$run_id" --repo "$repo" --name "nvs-staging-fixture-bootstrap-${run_id}-1" --dir "$dir"
          summary="$dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          cp "$summary" "$RUNNER_TEMP/apply.md"

      - name: Verify idempotent final state
        id: verify
        if: steps.plan.outcome == 'success' && steps.apply.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          run_id=''
          for _attempt in $(seq 1 120); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status
          dir="$RUNNER_TEMP/verify"; mkdir -p "$dir"
          gh run download "$run_id" --repo "$repo" --name "nvs-staging-fixture-bootstrap-${run_id}-1" --dir "$dir"
          summary="$dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == NONE_ALREADY_READY ]]
          cp "$summary" "$RUNNER_TEMP/verify.md"

      - name: Publish dedicated sanitized result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_RUN: ${{ steps.plan.outputs.run_id }}
          APPLY_RUN: ${{ steps.apply.outputs.run_id }}
          VERIFY_RUN: ${{ steps.verify.outputs.run_id }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/final.md"
          {
            echo '# Configuration Approver finalizer execution'
            echo
            echo "- Target SHA: \`$TARGET_SHA\`"
            echo "- Reviewed full CI run: \`$REVIEWED_CI_RUN\` — production image, hardening, rollback, same-SHA and checksum proof passed"
            echo "- Successful exact-SHA deploy run: \`$DEPLOY_RUN\`"
            echo "- Plan run: \`${PLAN_RUN:-unavailable}\` — \`$PLAN_OUTCOME\`"
            echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\` — \`$APPLY_OUTCOME\`"
            echo "- Final idempotency verification: \`${VERIFY_RUN:-unavailable}\` — \`$VERIFY_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- NILES mutation switch: verified not enabled by the staging-control workflow'
            echo '- Live Incident acceptance: not executed'
            for pair in 'Fresh plan:plan.md' 'Authorized apply:apply.md' 'Final verification:verify.md'; do
              title="${pair%%:*}"; file="${pair#*:}"
              echo; echo "## $title"; echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then cat "$RUNNER_TEMP/$file"; else echo '**Sanitized artifact:** unavailable'; fi
            done
          } > "$body"
          if [[ "$PLAN_OUTCOME" == success && "$APPLY_OUTCOME" == success && "$VERIFY_OUTCOME" == success ]]; then
            gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --title 'Configuration Approver finalizer completed' --body-file "$body"
            gh issue close "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed
          else
            gh issue edit "$RESULT_ISSUE" --repo "$GITHUB_REPOSITORY" --title 'Configuration Approver finalizer blocked' --body-file "$body"
          fi

      - name: Enforce successful completion
        if: always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          [[ "$PLAN_OUTCOME" == success ]]
          [[ "$APPLY_OUTCOME" == success ]]
          [[ "$VERIFY_OUTCOME" == success ]]

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove execution workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-configuration-approver-finalizer-record.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-configuration-approver-finalizer-record.yml
          git commit -m 'chore: remove completed configuration approver finalizer record workflow'
          git push origin HEAD:main
