name: one-shot continue configuration approver bootstrap

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-continue-configuration-approver-bootstrap.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-continue-configuration-approver-bootstrap
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      REVIEWED_CI_RUN: '29539983066'
      DEPLOY_RUN: '29540003136'
      ENVIRONMENT_ID: staging-example
    steps:
      - name: Require reviewed CI and successful exact-SHA deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          [[ "$(gh api "repos/$repo/actions/runs/$REVIEWED_CI_RUN" --jq '.conclusion')" == success ]]
          [[ "$(gh api "repos/$repo/actions/runs/$DEPLOY_RUN" --jq '.conclusion')" == success ]]

      - name: Produce a fresh deterministic staging plan
        id: plan
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"

          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''

          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status

          result_dir="$RUNNER_TEMP/bootstrap-plan"
          mkdir -p "$result_dir"
          gh run download "$run_id" \
            --repo "$repo" \
            --name "nvs-staging-fixture-bootstrap-${run_id}-1" \
            --dir "$result_dir"
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          digest="$(sed -n 's/^- Bootstrap digest: `\([0-9a-f]\{64\}\)`$/\1/p' "$summary" | head -n 1)"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]

          allowed='^(CREATE_ASSIGNMENT_GROUP|ADD_SERVICE_DESK_MEMBER|CREATE_CI_CLASS|CREATE_CMDB_SERVICE|CREATE_CONFIGURATION_APPROVER|RECOVER_CONFIGURATION_APPROVER|CREATE_AND_PUBLISH_GOVERNED_SLA|COMPLETE_GOVERNED_SLA_PUBLISH|CREATE_SERVICE_OFFERING|CREATE_CONFIGURATION_ITEM|NONE_ALREADY_READY)$'
          action_count=0
          while IFS= read -r action; do
            [[ -z "$action" || "$action" =~ $allowed ]]
            if [[ -n "$action" ]]; then
              action_count=$((action_count + 1))
            fi
          done < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "$action_count" -ge 1 ]]

          cp "$summary" "$RUNNER_TEMP/bootstrap-plan.md"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Apply the previously authorized deterministic fixtures
        id: apply
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOOTSTRAP_DIGEST: ${{ steps.plan.outputs.digest }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          [[ "$BOOTSTRAP_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"

          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=apply \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest="$BOOTSTRAP_DIGEST" \
            --field confirmation=BOOTSTRAP_M1_02B_FIXTURES

          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status

          result_dir="$RUNNER_TEMP/bootstrap-apply"
          mkdir -p "$result_dir"
          gh run download "$run_id" \
            --repo "$repo" \
            --name "nvs-staging-fixture-bootstrap-${run_id}-1" \
            --dir "$result_dir"
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          cp "$summary" "$RUNNER_TEMP/bootstrap-apply.md"

      - name: Verify the final idempotent ready state
        id: verify
        if: steps.plan.outcome == 'success' && steps.apply.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"

          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''

          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ -n "$run_id" ]]
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$repo" --exit-status

          result_dir="$RUNNER_TEMP/bootstrap-verify"
          mkdir -p "$result_dir"
          gh run download "$run_id" \
            --repo "$repo" \
            --name "nvs-staging-fixture-bootstrap-${run_id}-1" \
            --dir "$result_dir"
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == 'NONE_ALREADY_READY' ]]
          cp "$summary" "$RUNNER_TEMP/bootstrap-verify.md"

      - name: Publish sanitized completion evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_RUN: ${{ steps.plan.outputs.run_id }}
          APPLY_RUN: ${{ steps.apply.outputs.run_id }}
          VERIFY_RUN: ${{ steps.verify.outputs.run_id }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-bootstrap-completion.md"
          {
            echo '# Sanitized Configuration Approver bootstrap completion'
            echo
            echo "- Reviewed implementation CI run: \`$REVIEWED_CI_RUN\` — \`success\`"
            echo '- Production image, hardening, rollback, same-SHA, and checksum proof: `PASS`'
            echo "- Deployed exact SHA: \`$TARGET_SHA\`"
            echo "- Exact-SHA deployment run: \`$DEPLOY_RUN\` — \`success\`"
            echo "- Fresh plan run: \`${PLAN_RUN:-unavailable}\` — \`$PLAN_OUTCOME\`"
            echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\` — \`$APPLY_OUTCOME\`"
            echo "- Final idempotency verification run: \`${VERIFY_RUN:-unavailable}\` — \`$VERIFY_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- NILES mutation switch: required disabled by the staging-control workflow'
            echo '- Live Incident acceptance: not executed'
            echo
            for pair in \
              'Fresh plan:bootstrap-plan.md' \
              'Authorized apply:bootstrap-apply.md' \
              'Final verification:bootstrap-verify.md'; do
              title="${pair%%:*}"
              file="${pair#*:}"
              echo "## $title"
              echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then
                cat "$RUNNER_TEMP/$file"
              else
                echo '**Sanitized artifact:** unavailable'
              fi
              echo
            done
          } > "$body"
          gh issue edit 23 \
            --repo "$GITHUB_REPOSITORY" \
            --title '[Closed] Configuration Approver bootstrap completed' \
            --body-file "$body"

      - name: Enforce complete successful operation
        if: always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          [[ "$PLAN_OUTCOME" == success ]]
          [[ "$APPLY_OUTCOME" == success ]]
          [[ "$VERIFY_OUTCOME" == success ]]

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed continuation workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-continue-configuration-approver-bootstrap.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-continue-configuration-approver-bootstrap.yml
          git commit -m 'chore: remove completed configuration approver bootstrap continuation'
          git push origin HEAD:main
