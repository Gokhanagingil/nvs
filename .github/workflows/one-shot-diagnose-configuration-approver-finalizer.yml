name: one-shot diagnose configuration approver finalizer

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-configuration-approver-finalizer.yml

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: nvs-one-shot-diagnose-configuration-approver-finalizer
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FAILED_DEPLOY_RUN: '29540003136'
      IMPLEMENTATION_PR: '72'
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
    steps:
      - name: Inspect CI and failed deploy with sanitized output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          report="$RUNNER_TEMP/configuration-approver-finalizer-diagnosis.md"
          pr_json="$RUNNER_TEMP/pr.json"
          runs_json="$RUNNER_TEMP/runs.json"
          jobs_json="$RUNNER_TEMP/jobs.json"
          deploy_json="$RUNNER_TEMP/deploy.json"
          deploy_jobs_json="$RUNNER_TEMP/deploy-jobs.json"
          failed_log="$RUNNER_TEMP/failed.log"
          sanitized_log="$RUNNER_TEMP/failed-sanitized.log"

          gh api "repos/$repo/pulls/$IMPLEMENTATION_PR" > "$pr_json"
          head_sha="$(jq -r '.head.sha' "$pr_json")"
          merged="$(jq -r '.merged' "$pr_json")"
          merged_at="$(jq -r '.merged_at // ""' "$pr_json")"
          [[ "$head_sha" == '6ee79698c9894d798aa6bbfd1fc3c197c1b9a0b3' ]]
          [[ "$merged" == 'true' ]]

          gh api "repos/$repo/actions/runs?head_sha=$head_sha&event=pull_request&per_page=100" > "$runs_json"
          ci_run="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].id // empty' "$runs_json")"
          [[ "$ci_run" =~ ^[0-9]+$ ]]
          ci_conclusion="$(jq -r --argjson id "$ci_run" '.workflow_runs[] | select(.id == $id) | .conclusion' "$runs_json")"
          ci_updated_at="$(jq -r --argjson id "$ci_run" '.workflow_runs[] | select(.id == $id) | .updated_at' "$runs_json")"
          gh api "repos/$repo/actions/runs/$ci_run/jobs?filter=latest&per_page=100" > "$jobs_json"

          required_steps=(
            'Build exact production image'
            'Prove bind mounts, read-only root, and ownership readiness'
            'Prove deploy rollback, same-SHA reference, and archive checksum'
          )
          ci_proof='PASS'
          [[ "$ci_conclusion" == 'success' ]] || ci_proof='FAIL'
          for step in "${required_steps[@]}"; do
            conclusion="$(jq -r --arg step "$step" '[.jobs[].steps[] | select(.name == $step)][0].conclusion // "missing"' "$jobs_json")"
            [[ "$conclusion" == 'success' ]] || ci_proof='FAIL'
          done
          chronology='PASS'
          if [[ -z "$merged_at" || "$ci_updated_at" > "$merged_at" ]]; then
            chronology='FAIL'
          fi

          gh api "repos/$repo/actions/runs/$FAILED_DEPLOY_RUN" > "$deploy_json"
          gh api "repos/$repo/actions/runs/$FAILED_DEPLOY_RUN/jobs?filter=latest&per_page=100" > "$deploy_jobs_json"
          deploy_name="$(jq -r '.name' "$deploy_json")"
          deploy_event="$(jq -r '.event' "$deploy_json")"
          deploy_head_sha="$(jq -r '.head_sha' "$deploy_json")"
          deploy_conclusion="$(jq -r '.conclusion' "$deploy_json")"
          failed_steps="$(jq -r '[.jobs[] | .name as $job | .steps[] | select(.conclusion == "failure") | "\($job) / \(.name)"] | if length == 0 then ["unavailable"] else . end | .[]' "$deploy_jobs_json")"

          set +e
          gh run view "$FAILED_DEPLOY_RUN" --repo "$repo" --log-failed > "$failed_log" 2>&1
          set -e
          python3 - "$failed_log" "$sanitized_log" <<'PY'
          import re
          import sys
          from pathlib import Path

          source = Path(sys.argv[1]).read_text(encoding='utf-8', errors='replace').splitlines()
          patterns = re.compile(r'(##\[error\]|\berror\b|\bfailed\b|\bfailure\b|ELIFECYCLE|ERR_|denied|not found|timed out|mismatch|expected|actual|exit code)', re.I)
          selected = [line for line in source if patterns.search(line)][-120:]
          output = []
          for line in selected:
              line = re.sub(r'\x1b\[[0-9;]*m', '', line)
              line = re.sub(r'(?i)(authorization|bearer|token|password|secret|key)(\s*[:=]\s*)\S+', r'\1\2<redacted>', line)
              line = re.sub(r'https?://\S+', '<redacted-url>', line)
              line = re.sub(r'\b(?:\d{1,3}\.){3}\d{1,3}\b', '<redacted-ip>', line)
              line = re.sub(r'(?i)\b[A-Za-z0-9+/=_-]{48,}\b', '<redacted-long-value>', line)
              if len(line) > 360:
                  line = line[:360] + '…'
              output.append(line)
          Path(sys.argv[2]).write_text('\n'.join(output) + ('\n' if output else ''), encoding='utf-8')
          PY

          {
            echo '# Sanitized Configuration Approver finalizer diagnosis'
            echo
            echo '## Reviewed implementation CI'
            echo
            echo "- PR: \`#$IMPLEMENTATION_PR\`"
            echo "- Head SHA: \`$head_sha\`"
            echo "- CI run: \`$ci_run\` — \`$ci_conclusion\`"
            echo "- Production-image / hardening / rollback-same-SHA-checksum proof: \`$ci_proof\`"
            echo "- CI completed before merge: \`$chronology\`"
            echo
            echo '## Failed exact-SHA deployment'
            echo
            echo "- Workflow: \`$deploy_name\`"
            echo "- Event: \`$deploy_event\`"
            echo "- Requested target SHA: \`$TARGET_SHA\`"
            echo "- Run head SHA: \`$deploy_head_sha\`"
            echo "- Run: \`$FAILED_DEPLOY_RUN\` — \`$deploy_conclusion\`"
            echo '- Failed step(s):'
            while IFS= read -r step; do
              echo "  - \`$step\`"
            done <<< "$failed_steps"
            echo
            echo '## Sanitized failure markers'
            echo
            if [[ -s "$sanitized_log" ]]; then
              echo '```text'
              cat "$sanitized_log"
              echo '```'
            else
              echo '**No safe failure marker was available.**'
            fi
            echo
            echo '- NILES mutation switch: unchanged and disabled'
            echo '- Fixture apply: not run after the failed deployment'
            echo '- Live Incident acceptance: not executed'
          } > "$report"

          title='[Blocked] Configuration Approver finalizer deployment diagnosed'
          if [[ "$ci_proof" == 'PASS' && "$chronology" == 'PASS' ]]; then
            title='[Blocked] Configuration Approver exact-SHA deployment diagnosed'
          fi
          gh issue edit 23 --repo "$repo" --title "$title" --body-file "$report"

  cleanup:
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed diagnostic workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-diagnose-configuration-approver-finalizer.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-diagnose-configuration-approver-finalizer.yml
          git commit -m 'chore: remove completed configuration approver finalizer diagnostic workflow'
          git push origin HEAD:main
