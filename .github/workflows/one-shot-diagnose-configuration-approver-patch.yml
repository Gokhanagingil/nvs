name: one-shot diagnose configuration approver patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-configuration-approver-patch.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-diagnose-config-approver
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out prepared implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-configuration-approver
          persist-credentials: false
          fetch-depth: 1

      - name: Run deterministic patch in diagnostic mode
        id: patch
        continue-on-error: true
        run: |
          set +e
          python3 tools/apply-bootstrap-configuration-approver-v2.py >"$RUNNER_TEMP/patch.out" 2>"$RUNNER_TEMP/patch.err"
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish sanitized diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_STATUS: ${{ steps.patch.outputs.status }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/diagnostic.md"
          {
            echo '# Sanitized configuration approver patch diagnostic'
            echo
            echo "- Patch exit status: \`${PATCH_STATUS:-unavailable}\`"
            echo '- Branch: `fix/bootstrap-configuration-approver`'
            echo
            echo '## Safe diagnostic tail'
            echo
            echo '```text'
            {
              tail -n 40 "$RUNNER_TEMP/patch.err" 2>/dev/null || true
              tail -n 20 "$RUNNER_TEMP/patch.out" 2>/dev/null || true
            } \
              | sed -E 's#(/home/runner/work/)[^ ]+#<runner-path>#g' \
              | sed -E 's/[0-9a-f]{32,}/<hex-redacted>/g' \
              | head -n 60
            echo '```'
            echo
            echo 'No credential, token, staging payload, UUID, or private inventory was accessed by this diagnostic.'
          } > "$body"
          gh issue edit 23 \
            --repo "$GITHUB_REPOSITORY" \
            --title '[Closed] Sanitized configuration approver patch diagnostic' \
            --body-file "$body"

      - name: Enforce diagnostic expectation
        env:
          PATCH_STATUS: ${{ steps.patch.outputs.status }}
        run: |
          set -euo pipefail
          [[ -n "$PATCH_STATUS" ]]

  cleanup:
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove temporary diagnostic workflow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Commit cleanup
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-diagnose-configuration-approver-patch.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-diagnose-configuration-approver-patch.yml
          git commit -m 'chore: remove completed configuration approver diagnostic'
          git push origin HEAD:main
