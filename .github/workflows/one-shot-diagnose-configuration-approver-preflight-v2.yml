name: one-shot diagnose configuration approver preflight v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-configuration-approver-preflight-v2.yml

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      IMPLEMENTATION_PR: '72'
      IMPLEMENTATION_HEAD_SHA: 6ee79698c9894d798aa6bbfd1fc3c197c1b9a0b3
      SUCCESSFUL_DEPLOY_RUN: '29540003136'
      SELF_PATH: .github/workflows/one-shot-diagnose-configuration-approver-preflight-v2.yml
    steps:
      - name: Publish exact preflight checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          repo="$GITHUB_REPOSITORY"
          report="$RUNNER_TEMP/preflight-v2.md"
          mark() { if "$@"; then echo PASS; else echo FAIL; fi; }

          pr_json="$(gh api "repos/$repo/pulls/$IMPLEMENTATION_PR" 2>/dev/null || true)"
          pr_merged="$(jq -r '.merged // false' <<< "$pr_json" 2>/dev/null || echo false)"
          pr_head="$(jq -r '.head.sha // ""' <<< "$pr_json" 2>/dev/null || true)"
          pr_merge="$(jq -r '.merge_commit_sha // ""' <<< "$pr_json" 2>/dev/null || true)"
          merged_at="$(jq -r '.merged_at // ""' <<< "$pr_json" 2>/dev/null || true)"

          runs_json="$(gh api "repos/$repo/actions/runs?head_sha=$IMPLEMENTATION_HEAD_SHA&event=pull_request&per_page=100" 2>/dev/null || true)"
          ci_run="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].id // ""' <<< "$runs_json" 2>/dev/null || true)"
          ci_conclusion="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].conclusion // ""' <<< "$runs_json" 2>/dev/null || true)"
          ci_updated_at="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].updated_at // ""' <<< "$runs_json" 2>/dev/null || true)"
          jobs_json=''
          if [[ "$ci_run" =~ ^[0-9]+$ ]]; then
            jobs_json="$(gh api "repos/$repo/actions/runs/$ci_run/jobs?filter=latest&per_page=100" 2>/dev/null || true)"
          fi

          compare_json="$(gh api "repos/$repo/compare/$TARGET_SHA...main" 2>/dev/null || true)"
          mapfile -t changed < <(jq -r '.files[].filename' <<< "$compare_json" 2>/dev/null || true)
          mapfile -t one_shots < <(gh api "repos/$repo/contents/.github/workflows?ref=main" --jq '.[].name' 2>/dev/null | grep '^one-shot-' || true)

          deploy_json="$(gh api "repos/$repo/actions/runs/$SUCCESSFUL_DEPLOY_RUN" 2>/dev/null || true)"
          deploy_name="$(jq -r '.name // ""' <<< "$deploy_json" 2>/dev/null || true)"
          deploy_event="$(jq -r '.event // ""' <<< "$deploy_json" 2>/dev/null || true)"
          deploy_conclusion="$(jq -r '.conclusion // ""' <<< "$deploy_json" 2>/dev/null || true)"

          image_step="$(jq -r '[.jobs[].steps[] | select(.name == "Build exact production image")][0].conclusion // "missing"' <<< "$jobs_json" 2>/dev/null || echo unavailable)"
          hardening_step="$(jq -r '[.jobs[].steps[] | select(.name == "Prove bind mounts, read-only root, and ownership readiness")][0].conclusion // "missing"' <<< "$jobs_json" 2>/dev/null || echo unavailable)"
          rollback_step="$(jq -r '[.jobs[].steps[] | select(.name == "Prove deploy rollback, same-SHA reference, and archive checksum")][0].conclusion // "missing"' <<< "$jobs_json" 2>/dev/null || echo unavailable)"

          {
            echo '# Sanitized Configuration Approver preflight v2'
            echo
            echo "- PR merged check: \`$(mark test "$pr_merged" = true)\` (value \`$pr_merged\`)"
            echo "- PR head check: \`$(mark test "$pr_head" = "$IMPLEMENTATION_HEAD_SHA")\` (value \`${pr_head:-unavailable}\`)"
            echo "- PR merge SHA check: \`$(mark test "$pr_merge" = "$TARGET_SHA")\` (value \`${pr_merge:-unavailable}\`)"
            echo "- CI run ID check: \`$(mark bash -c '[[ "$1" =~ ^[0-9]+$ ]]' _ "$ci_run")\` (value \`${ci_run:-unavailable}\`)"
            echo "- CI conclusion check: \`$(mark test "$ci_conclusion" = success)\` (value \`${ci_conclusion:-unavailable}\`)"
            echo "- Production image step: \`$image_step\`"
            echo "- Hardening step: \`$hardening_step\`"
            echo "- Rollback/same-SHA/checksum step: \`$rollback_step\`"
            echo "- CI chronology: merge \`${merged_at:-unavailable}\`; completion \`${ci_updated_at:-unavailable}\`"
            echo "- Net changed file count from target to main: \`${#changed[@]}\`"
            for file in "${changed[@]}"; do echo "  - \`$file\`"; done
            echo "- One-shot workflow count on main: \`${#one_shots[@]}\`"
            for file in "${one_shots[@]}"; do echo "  - \`$file\`"; done
            echo "- Deploy workflow name check: \`$(mark test "$deploy_name" = 'deploy staging')\` (value \`${deploy_name:-unavailable}\`)"
            echo "- Deploy event check: \`$(mark test "$deploy_event" = workflow_dispatch)\` (value \`${deploy_event:-unavailable}\`)"
            echo "- Deploy conclusion check: \`$(mark test "$deploy_conclusion" = success)\` (value \`${deploy_conclusion:-unavailable}\`)"
            echo
            echo '- NILES mutation switch: unchanged and disabled'
            echo '- Fixture apply: not executed by this diagnostic'
            echo '- Live Incident acceptance: not executed'
          } > "$report"
          gh issue edit 23 --repo "$repo" --title '[Blocked] Configuration Approver preflight v2 diagnosed' --body-file "$report"

  cleanup:
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove diagnostic workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-diagnose-configuration-approver-preflight-v2.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-diagnose-configuration-approver-preflight-v2.yml
          git commit -m 'chore: remove configuration approver preflight v2 diagnostic workflow'
          git push origin HEAD:main
