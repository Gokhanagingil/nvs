name: one-shot diagnose configuration approver preflight

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-configuration-approver-preflight.yml

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: nvs-one-shot-diagnose-configuration-approver-preflight
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      IMPLEMENTATION_PR: '72'
      IMPLEMENTATION_HEAD_SHA: 6ee79698c9894d798aa6bbfd1fc3c197c1b9a0b3
      SUCCESSFUL_DEPLOY_RUN: '29540003136'
      SELF_PATH: .github/workflows/one-shot-diagnose-configuration-approver-preflight.yml
    steps:
      - name: Publish check-by-check sanitized preflight evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          repo="$GITHUB_REPOSITORY"
          report="$RUNNER_TEMP/preflight-diagnosis.md"
          pass() { printf '%s' 'PASS'; }
          fail() { printf '%s' 'FAIL'; }

          pr_json="$(gh api "repos/$repo/pulls/$IMPLEMENTATION_PR" 2>/dev/null || true)"
          pr_merged="$(jq -r '.merged // "unavailable"' <<< "$pr_json" 2>/dev/null || echo unavailable)"
          pr_head="$(jq -r '.head.sha // "unavailable"' <<< "$pr_json" 2>/dev/null || echo unavailable)"
          pr_merge="$(jq -r '.merge_commit_sha // "unavailable"' <<< "$pr_json" 2>/dev/null || echo unavailable)"
          merged_at="$(jq -r '.merged_at // "unavailable"' <<< "$pr_json" 2>/dev/null || echo unavailable)"

          runs_json="$(gh api "repos/$repo/actions/runs?head_sha=$IMPLEMENTATION_HEAD_SHA&event=pull_request&per_page=100" 2>/dev/null || true)"
          ci_run="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].id // "unavailable"' <<< "$runs_json" 2>/dev/null || echo unavailable)"
          ci_conclusion="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].conclusion // "unavailable"' <<< "$runs_json" 2>/dev/null || echo unavailable)"
          ci_updated_at="$(jq -r '[.workflow_runs[] | select(.name == "ci")][0].updated_at // "unavailable"' <<< "$runs_json" 2>/dev/null || echo unavailable)"
          jobs_json=''
          if [[ "$ci_run" =~ ^[0-9]+$ ]]; then
            jobs_json="$(gh api "repos/$repo/actions/runs/$ci_run/jobs?filter=latest&per_page=100" 2>/dev/null || true)"
          fi

          compare_json="$(gh api "repos/$repo/compare/$TARGET_SHA...main" 2>/dev/null || true)"
          mapfile -t changed < <(jq -r '.files[].filename' <<< "$compare_json" 2>/dev/null || true)
          mapfile -t one_shots < <(gh api "repos/$repo/contents/.github/workflows?ref=main" --jq '.[].name' 2>/dev/null | grep '^one-shot-' || true)
          branch_sha="$(gh api "repos/$repo/git/ref/heads/fix/bootstrap-configuration-approver" --jq '.object.sha' 2>/dev/null || echo unavailable)"

          deploy_json="$(gh api "repos/$repo/actions/runs/$SUCCESSFUL_DEPLOY_RUN" 2>/dev/null || true)"
          deploy_name="$(jq -r '.name // "unavailable"' <<< "$deploy_json" 2>/dev/null || echo unavailable)"
          deploy_event="$(jq -r '.event // "unavailable"' <<< "$deploy_json" 2>/dev/null || echo unavailable)"
          deploy_conclusion="$(jq -r '.conclusion // "unavailable"' <<< "$deploy_json" 2>/dev/null || echo unavailable)"
          deploy_jobs="$(gh api "repos/$repo/actions/runs/$SUCCESSFUL_DEPLOY_RUN/jobs?filter=latest&per_page=100" 2>/dev/null || true)"
          deploy_log="$RUNNER_TEMP/deploy.log"
          gh run view "$SUCCESSFUL_DEPLOY_RUN" --repo "$repo" --log > "$deploy_log" 2>/dev/null || true
          resolution_marker='FAIL'
          if grep -Fq "Resolved $TARGET_SHA to $TARGET_SHA" "$deploy_log"; then
            resolution_marker='PASS'
          fi

          {
            echo '# Sanitized Configuration Approver preflight diagnosis'
            echo
            echo '## PR identity'
            echo
            echo "- merged: \`$pr_merged\`"
            echo "- head SHA: \`$pr_head\`"
            echo "- merge SHA: \`$pr_merge\`"
            echo "- merged at: \`$merged_at\`"
            echo
            echo '## PR CI'
            echo
            echo "- CI run: \`$ci_run\`"
            echo "- CI conclusion: \`$ci_conclusion\`"
            echo "- CI updated at: \`$ci_updated_at\`"
            for step in \
              'Build exact production image' \
              'Prove bind mounts, read-only root, and ownership readiness' \
              'Prove deploy rollback, same-SHA reference, and archive checksum'; do
              conclusion="$(jq -r --arg step "$step" '[.jobs[].steps[] | select(.name == $step)][0].conclusion // "missing"' <<< "$jobs_json" 2>/dev/null || echo unavailable)"
              echo "- \`$step\`: \`$conclusion\`"
            done
            echo
            echo '## Clean-tree and branch evidence'
            echo
            echo '- Net files from target SHA to current main:'
            if [[ "${#changed[@]}" -eq 0 ]]; then
              echo '  - `none`'
            else
              for file in "${changed[@]}"; do echo "  - \`$file\`"; done
            fi
            echo '- Current one-shot workflows:'
            if [[ "${#one_shots[@]}" -eq 0 ]]; then
              echo '  - `none`'
            else
              for file in "${one_shots[@]}"; do echo "  - \`$file\`"; done
            fi
            echo "- fix/bootstrap-configuration-approver SHA: \`$branch_sha\`"
            echo
            echo '## Exact-SHA deploy proof'
            echo
            echo "- workflow: \`$deploy_name\`"
            echo "- event: \`$deploy_event\`"
            echo "- conclusion: \`$deploy_conclusion\`"
            echo "- exact resolution marker: \`$resolution_marker\`"
            echo '- Deploy steps:'
            jq -r '.jobs[].steps[] | "  - `\(.name)`: `\(.conclusion // "null")`"' <<< "$deploy_jobs" 2>/dev/null || echo '  - `unavailable`'
            echo
            echo '- NILES mutation switch: unchanged and disabled'
            echo '- Fixture apply: not executed by this diagnostic'
            echo '- Live Incident acceptance: not executed'
          } > "$report"
          gh issue edit 23 --repo "$repo" --title '[Blocked] Configuration Approver preflight diagnosed' --body-file "$report"

  cleanup:
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed diagnostic workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-diagnose-configuration-approver-preflight.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-diagnose-configuration-approver-preflight.yml
          git commit -m 'chore: remove completed configuration approver preflight diagnostic workflow'
          git push origin HEAD:main
