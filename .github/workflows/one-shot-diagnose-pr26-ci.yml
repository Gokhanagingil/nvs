name: one-shot diagnose PR26 CI

on:
  push:
    branches:
      - ops/apply-staging-fixture-bootstrap
    paths:
      - .github/workflows/one-shot-diagnose-pr26-ci.yml

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ops/apply-staging-fixture-bootstrap
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Run CI and publish only the sanitized failing tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          raw="$RUNNER_TEMP/pr26-ci.log"
          safe="$RUNNER_TEMP/pr26-ci-safe.log"
          set +e
          pnpm run ci > "$raw" 2>&1
          status=$?
          set -e
          tail -n 50 "$raw" \
            | sed -E $'s/\x1B\[[0-9;]*[mK]//g' \
            | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
            > "$safe"
          body="$RUNNER_TEMP/pr26-ci.md"
          {
            echo '# Sanitized PR #26 CI diagnostic'
            echo
            echo "- Exit status: \`$status\`"
            echo
            echo '```text'
            cat "$safe"
            echo '```'
          } > "$body"
          gh issue edit 23 \
            --repo "$GITHUB_REPOSITORY" \
            --title '[Closed] Sanitized PR 26 CI diagnostic' \
            --body-file "$body"
          exit "$status"
