name: one-shot diagnose user-contract deployment failure

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-user-contract-deploy-failure.yml

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-diagnose-user-contract-deploy-failure
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FAILED_RUN_ID: '29540003136'
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
    steps:
      - name: Collect sanitized failed job and step evidence
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          raw_jobs="$RUNNER_TEMP/jobs.json"
          raw_log="$RUNNER_TEMP/failed.log"
          safe_log="$RUNNER_TEMP/failed-safe.log"
          metadata="$RUNNER_TEMP/metadata.md"

          gh api "repos/$repo/actions/runs/$FAILED_RUN_ID/jobs?per_page=100" > "$raw_jobs"
          failed_count="$(jq '[.jobs[] | select(.conclusion == "failure")] | length' "$raw_jobs")"
          [[ "$failed_count" -ge 1 ]]

          {
            echo '## Failed jobs and steps'
            echo
            jq -r '
              .jobs[]
              | select(.conclusion == "failure")
              | "- Job: `\(.name)` (`\(.id)`)\n" +
                ([.steps[] | select(.conclusion == "failure") | "  - Failed step: `\(.name)`"] | join("\n"))
            ' "$raw_jobs"
          } > "$metadata"

          : > "$raw_log"
          while IFS= read -r job_id; do
            gh run view "$FAILED_RUN_ID" --repo "$repo" --job "$job_id" --log-failed >> "$raw_log" 2>&1 || true
          done < <(jq -r '.jobs[] | select(.conclusion == "failure") | .id' "$raw_jobs")

          python3 - "$raw_log" "$safe_log" <<'PY'
          import re
          import sys
          from pathlib import Path

          source = Path(sys.argv[1]).read_text(encoding='utf-8', errors='replace').splitlines()
          patterns = re.compile(
              r'(error|fail|fatal|exception|expected|received|exit code|permission denied|'
              r'connection refused|timed out|timeout|not found|cannot find|syntax|typecheck|'
              r'lint|vitest|playwright|docker|checksum|sha|rollback|hardening)',
              re.I,
          )
          selected = []
          for line in source:
              if not patterns.search(line):
                  continue
              line = re.sub(r'https?://\S+', '[url]', line)
              line = re.sub(r'(?<![A-Za-z0-9._%+-])[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}(?![A-Za-z0-9.-])', '[email]', line)
              line = re.sub(r'\b(?:\d{1,3}\.){3}\d{1,3}\b', '[ip]', line)
              line = re.sub(r'(?i)(authorization|bearer|password|token|secret|credential)(\s*[:=]\s*)\S+', r'\1\2[redacted]', line)
              line = re.sub(r'\b[A-Za-z0-9+/=_-]{80,}\b', '[redacted-long-value]', line)
              line = line[:600]
              if line not in selected:
                  selected.append(line)
              if len(selected) >= 120:
                  break
          Path(sys.argv[2]).write_text('\n'.join(selected) + ('\n' if selected else ''), encoding='utf-8')
          PY

          if [[ ! -s "$safe_log" ]]; then
            echo 'No allow-listed error lines were available in the failed-step log.' > "$safe_log"
          fi

          body="$RUNNER_TEMP/deploy-failure-diagnostic.md"
          {
            echo '# Sanitized exact-SHA deployment failure diagnostic'
            echo
            echo "- Target SHA: \`$TARGET_SHA\`"
            echo "- Deployment run: \`$FAILED_RUN_ID\`"
            echo '- Staging fixture apply: not started in this attempt'
            echo '- NILES mutation switch: unchanged and disabled'
            echo '- Live Incident acceptance: not executed'
            echo
            cat "$metadata"
            echo
            echo '## Sanitized failed-log excerpt'
            echo
            echo '```text'
            cat "$safe_log"
            echo '```'
          } > "$body"

          gh issue edit 23 \
            --repo "$repo" \
            --title '[Closed] Exact-SHA deployment failure diagnostic' \
            --body-file "$body"

  cleanup:
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed diagnostic workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-diagnose-user-contract-deploy-failure.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-diagnose-user-contract-deploy-failure.yml
          git commit -m 'chore: remove completed user-contract deploy diagnostic workflow'
          git push origin HEAD:main
