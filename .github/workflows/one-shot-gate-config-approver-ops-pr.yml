name: one-shot gate configuration approver dispatcher

on:
  push:
    branches:
      - ops/apply-bootstrap-configuration-approver
    paths:
      - .github/workflows/one-shot-gate-config-approver-ops-pr.yml

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: nvs-one-shot-config-approver-dispatcher-gate
  cancel-in-progress: false

jobs:
  gate-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the dispatcher branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ops/apply-bootstrap-configuration-approver
          persist-credentials: true
          fetch-depth: 0

      - name: Finalize the one-shot workflow and remove this gate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          target = Path('.github/workflows/one-shot-apply-bootstrap-configuration-approver.yml')
          text = target.read_text(encoding='utf-8')
          guard = "    if: github.actor != 'github-actions[bot]'\n"
          if text.count(guard) != 1:
              raise SystemExit('expected exactly one bot guard in the dispatcher workflow')
          target.write_text(text.replace(guard, '', 1), encoding='utf-8')
          PY
          rm -f .github/workflows/one-shot-gate-config-approver-ops-pr.yml
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git add .github/workflows
          git commit -m 'ops: finalize configuration approver patch dispatcher'
          git push origin HEAD:ops/apply-bootstrap-configuration-approver

      - name: Wait for the final-head CI and squash merge the dispatcher PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          head_sha="$(git rev-parse HEAD)"
          pr_number="$(
            gh pr list \
              --repo "$repo" \
              --state open \
              --base main \
              --head ops/apply-bootstrap-configuration-approver \
              --limit 1 \
              --json number \
              --jq '.[0].number // 0'
          )"
          [[ "$pr_number" != 0 ]]

          run_id=''
          for _attempt in $(seq 1 90); do
            sleep 2
            candidate="$(
              gh run list \
                --repo "$repo" \
                --commit "$head_sha" \
                --event pull_request \
                --limit 20 \
                --json databaseId,name \
                --jq '[.[] | select(.name == "ci")][0].databaseId // 0'
            )"
            if [[ "$candidate" != 0 ]]; then
              run_id="$candidate"
              break
            fi
          done
          [[ -n "$run_id" ]]
          gh run watch "$run_id" --repo "$repo" --exit-status
          gh pr merge "$pr_number" \
            --repo "$repo" \
            --squash \
            --match-head-commit "$head_sha" \
            --subject 'ops: apply configuration approver bootstrap patch once'
