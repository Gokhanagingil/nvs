name: one-shot inspect staging deployment failure

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-inspect-staging-deploy-failure.yml

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-inspect-staging-deploy-failure
  cancel-in-progress: false

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FAILED_RUN_ID: 29540003136
    steps:
      - name: Inspect only sanitized Actions evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          jobs_json="$RUNNER_TEMP/jobs.json"
          steps_file="$RUNNER_TEMP/failed-steps.txt"
          filtered_log="$RUNNER_TEMP/filtered-log.txt"
          body="$RUNNER_TEMP/staging-deploy-diagnostic.md"

          gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$repo/actions/runs/$FAILED_RUN_ID/jobs?filter=latest&per_page=100" \
            > "$jobs_json"

          failed_job_id="$(
            jq -r '.jobs[] | select(.conclusion == "failure") | .id' "$jobs_json" |
              head -n 1
          )"
          failed_job_name="$(
            jq -r '.jobs[] | select(.conclusion == "failure") | .name' "$jobs_json" |
              head -n 1
          )"
          [[ "$failed_job_id" =~ ^[0-9]+$ ]]
          test -n "$failed_job_name"

          jq -r \
            '.jobs[] | select(.conclusion == "failure") | .steps[] | select(.conclusion == "failure") | "- Step \(.number): `\(.name)` — `\(.conclusion)`"' \
            "$jobs_json" > "$steps_file"
          test -s "$steps_file"

          raw_log="$RUNNER_TEMP/failed-job.log"
          gh run view "$FAILED_RUN_ID" \
            --repo "$repo" \
            --job "$failed_job_id" \
            --log > "$raw_log"

          grep -E \
            '##\[error\]|Process completed|(^|[[:space:]])(Error|ERROR|FATAL|failed|failure|Permission denied|read-only|No such file|not found|mismatch|checksum|health|rollback|SHA)([[:space:]:]|$)' \
            "$raw_log" |
            tail -n 40 |
            sed -E \
              -e 's#https?://[^[:space:]]+#[REDACTED_URL]#g' \
              -e 's#([0-9]{1,3}\.){3}[0-9]{1,3}#[REDACTED_IP]#g' \
              -e 's#[A-Za-z0-9+/=_-]{80,}#[REDACTED_TOKEN]#g' \
              > "$filtered_log" || true

          {
            echo '# Sanitized staging deployment failure diagnostic'
            echo
            echo "- Failed deploy run: \`$FAILED_RUN_ID\`"
            echo "- Failed job: \`$failed_job_name\`"
            echo '- Evidence source: GitHub Actions job metadata and masked failed-job log'
            echo '- Staging mutation performed by this diagnostic: none'
            echo '- NILES mutation switch: unchanged and required disabled'
            echo '- Live Incident acceptance: not executed'
            echo
            echo '## Failed step metadata'
            echo
            cat "$steps_file"
            echo
            echo '## Filtered masked error lines'
            echo
            if [[ -s "$filtered_log" ]]; then
              echo '```text'
              cat "$filtered_log"
              echo '```'
            else
              echo 'No matching error line was exposed; failed-step metadata remains available.'
            fi
          } > "$body"

          gh issue edit 23 \
            --repo "$repo" \
            --title '[Closed] Staging deployment failure diagnostic' \
            --body-file "$body"

  cleanup:
    needs: inspect
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed diagnostic workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-inspect-staging-deploy-failure.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-inspect-staging-deploy-failure.yml
          git commit -m 'chore: remove completed staging deployment diagnostic workflow'
          git push origin HEAD:main
