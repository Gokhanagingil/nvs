name: one-shot open legacy patch diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-open-legacy-patch-diagnostic.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Open a temporary sanitized diagnostic issue
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RUN_ID: '29491922188'
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          raw="$RUNNER_TEMP/legacy-patch-failed.log"
          safe="$RUNNER_TEMP/legacy-patch-failed-safe.log"
          gh run view "$TARGET_RUN_ID" --repo "$repo" --log-failed > "$raw"
          tail -n 180 "$raw" \
            | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
            > "$safe"
          body="$RUNNER_TEMP/legacy-patch-failed.md"
          {
            echo 'Temporary sanitized diagnostic for the failed legacy assignment patch workflow.'
            echo
            echo "Source run: $TARGET_RUN_ID"
            echo
            echo '```text'
            cat "$safe"
            echo '```'
          } > "$body"
          gh issue create \
            --repo "$repo" \
            --title 'TEMP: legacy assignment patch failure diagnostic' \
            --body-file "$body" \
            >/dev/null
