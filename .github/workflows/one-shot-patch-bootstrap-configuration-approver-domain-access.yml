name: one-shot patch bootstrap configuration approver domain access

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-patch-bootstrap-configuration-approver-domain-access.yml

permissions:
  contents: write

concurrency:
  group: nvs-one-shot-patch-bootstrap-configuration-approver-domain-access
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Patch only the supported user domain-access contract
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git checkout -B fix/bootstrap-configuration-approver-domain-access
          python - <<'PY'
          from pathlib import Path

          script_path = Path('ops/staging-fixture-bootstrap.mjs')
          script = script_path.read_text(encoding='utf-8')
          old = """          hasItsmAccess: true,
          mustChangePassword: false,"""
          new = """          domainAccessGrc: false,
          domainAccessItsm: true,
          domainAccessSpace: false,
          mustChangePassword: false,"""
          if script.count(old) != 1:
              raise SystemExit('expected exactly one legacy configuration approver domain-access payload')
          script_path.write_text(script.replace(old, new), encoding='utf-8')

          test_path = Path('tests/staging-fixture-bootstrap-assets.test.ts')
          test = test_path.read_text(encoding='utf-8')
          old_test = """    expect(source).toContain(\"role: 'admin'\");
    expect(source).toContain('mustChangePassword: false');"""
          new_test = """    expect(source).toContain(\"role: 'admin'\");
    expect(source).toContain('domainAccessGrc: false');
    expect(source).toContain('domainAccessItsm: true');
    expect(source).toContain('domainAccessSpace: false');
    expect(source).toContain('mustChangePassword: false');
    expect(source).not.toContain('hasItsmAccess');"""
          if test.count(old_test) != 1:
              raise SystemExit('expected exactly one configuration approver regression anchor')
          test_path.write_text(test.replace(old_test, new_test), encoding='utf-8')
          PY
          rm -f .github/workflows/one-shot-patch-bootstrap-configuration-approver-domain-access.yml
          git add -A
          changed="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/one-shot-patch-bootstrap-configuration-approver-domain-access.yml' \
            'ops/staging-fixture-bootstrap.mjs' \
            'tests/staging-fixture-bootstrap-assets.test.ts' | sort)"
          [[ "$changed" == "$expected" ]]
          pnpm install --frozen-lockfile
          pnpm exec prettier --check \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --cached --check
          git commit -m 'fix: use supported domain access contract for configuration approver'
          git push --force-with-lease origin HEAD:fix/bootstrap-configuration-approver-domain-access

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed patch workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-patch-bootstrap-configuration-approver-domain-access.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-patch-bootstrap-configuration-approver-domain-access.yml
          git commit -m 'chore: remove completed configuration approver domain-access patch workflow'
          git push origin HEAD:main
