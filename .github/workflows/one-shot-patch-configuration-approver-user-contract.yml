name: one-shot patch configuration approver user contract

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-patch-configuration-approver-user-contract.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-patch-configuration-approver-user-contract
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out clean implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-configuration-approver-user-contract
          persist-credentials: true
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Apply deterministic NILES create-user contract correction
        id: patch
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin fix/bootstrap-configuration-approver-user-contract
          pnpm install --frozen-lockfile

          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one exact match, found {count}: {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          script = Path('ops/staging-fixture-bootstrap.mjs')
          replace_once(
              script,
              "          isGlobalAdmin: false,\n"
              "          hasItsmAccess: true,\n"
              "          mustChangePassword: false,\n",
              "          isGlobalAdmin: false,\n"
              "          tenantId: context.tenantId,\n"
              "          domainAccessItsm: true,\n"
              "          mustChangePassword: false,\n",
          )

          tests = Path('tests/staging-fixture-bootstrap-assets.test.ts')
          replace_once(
              tests,
              "    expect(source).toContain(\"role: 'admin'\");\n"
              "    expect(source).toContain('mustChangePassword: false');\n",
              "    expect(source).toContain(\"role: 'admin'\");\n"
              "    expect(source).toContain('tenantId: context.tenantId');\n"
              "    expect(source).toContain('domainAccessItsm: true');\n"
              "    expect(source).not.toContain('hasItsmAccess: true');\n"
              "    expect(source).toContain('mustChangePassword: false');\n",
          )
          PY

          pnpm exec prettier --write \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check

          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            'ops/staging-fixture-bootstrap.mjs' \
            'tests/staging-fixture-bootstrap-assets.test.ts' | sort)"
          [[ "$changed" == "$expected" ]]

          git add ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          git commit -m 'fix: align configuration approver with NILES user contract'
          git push origin HEAD:fix/bootstrap-configuration-approver-user-contract
          echo "implementation_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish sanitized patch result
        env:
          GH_TOKEN: ${{ github.token }}
          IMPLEMENTATION_SHA: ${{ steps.patch.outputs.implementation_sha }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-user-contract-result.md"
          {
            echo '# Sanitized Configuration Approver user-contract correction'
            echo
            echo '- Deterministic blocker: the NILES create-user DTO rejects the legacy `hasItsmAccess` property and requires an explicit tenant assignment for a tenant-scoped account.'
            echo '- Correction: send `tenantId` and the supported `domainAccessItsm` field.'
            echo "- Implementation branch: \`fix/bootstrap-configuration-approver-user-contract\`"
            echo "- Implementation SHA: \`$IMPLEMENTATION_SHA\`"
            echo '- Validation: formatting, Node syntax, ESLint, focused tests, TypeScript, and diff checks passed.'
            echo '- Staging access or mutation: none'
            echo '- NILES mutation switch: unchanged and disabled'
            echo '- Live Incident acceptance: not executed'
          } > "$body"
          gh issue edit 23 \
            --repo "$GITHUB_REPOSITORY" \
            --title '[Closed] Configuration Approver user-contract correction' \
            --body-file "$body"

  cleanup:
    needs: patch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed patch workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-patch-configuration-approver-user-contract.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-patch-configuration-approver-user-contract.yml
          git commit -m 'chore: remove completed configuration approver user-contract patch workflow'
          git push origin HEAD:main
