name: one-shot rebuild clean bootstrap private data directory branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-rebuild-bootstrap-private-data-dir-clean.yml

permissions:
  contents: write

concurrency:
  group: nvs-one-shot-rebuild-bootstrap-private-data-dir-clean
  cancel-in-progress: false

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLEAN_BASE: 0da3d9874a57af5cf76f10b28ae206992cf2660a
      SOURCE_BASE: 32efc37ca21b2e479f3ea4997845a0ea456ac17b
      SOURCE_SHA: a1599785e0b8bbf177adab3d47d75236c4ae3e0e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Rebuild branch from clean base using only implementation files
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git cat-file -e "${CLEAN_BASE}^{commit}"
          git cat-file -e "${SOURCE_BASE}^{commit}"
          git cat-file -e "${SOURCE_SHA}^{commit}"
          git checkout -B fix/bootstrap-private-data-dir "$CLEAN_BASE"
          git diff "$SOURCE_BASE" "$SOURCE_SHA" -- \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts | git apply --index
          changed="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' \
            'docs/operations/STAGING_FIXTURE_BOOTSTRAP.md' \
            'ops/staging-fixture-bootstrap.mjs' \
            'tests/staging-fixture-bootstrap-assets.test.ts' | sort)"
          [[ "$changed" == "$expected" ]]
          test ! -e .github/workflows/one-shot-patch-bootstrap-private-data-dir.yml
          test ! -e .github/workflows/one-shot-refresh-bootstrap-private-data-dir.yml
          test ! -e .github/workflows/one-shot-rebuild-bootstrap-private-data-dir-clean.yml
          pnpm install --frozen-lockfile
          pnpm exec prettier --check \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --cached --check
          git commit -m 'fix: store bootstrap private state in configured data mount'
          git push --force-with-lease origin HEAD:fix/bootstrap-private-data-dir

  cleanup:
    needs: rebuild
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed rebuild workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-rebuild-bootstrap-private-data-dir-clean.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-rebuild-bootstrap-private-data-dir-clean.yml
          git commit -m 'chore: remove completed bootstrap branch rebuild workflow'
          git push origin HEAD:main
