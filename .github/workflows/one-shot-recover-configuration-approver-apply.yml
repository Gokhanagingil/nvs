name: one-shot recover configuration approver apply

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-recover-configuration-approver-apply.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-recover-configuration-approver-apply
  cancel-in-progress: false

jobs:
  recover:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      ENVIRONMENT_ID: staging-example
      PLAN_RUN: '29541121512'
      BOOTSTRAP_DIGEST: 185340d0ad0a4776fdd5987f8141367e6ab4cbc7da0003a5aa35f4276407973c
    steps:
      - name: Recover or dispatch authorized apply, then verify idempotency
        id: operate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          workflow='staging-fixture-bootstrap.yml'

          wait_completed() {
            local run_id="$1"
            local payload status conclusion
            for _attempt in $(seq 1 240); do
              payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
              if [[ -n "$payload" ]]; then
                status="$(jq -r '.status // ""' <<< "$payload")"
                conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
                if [[ "$status" == 'completed' ]]; then
                  printf '%s\n' "$conclusion"
                  return 0
                fi
              fi
              sleep 5
            done
            printf '%s\n' timeout
          }

          download_summary() {
            local run_id="$1"
            local output_dir="$2"
            local payload attempt artifact downloaded
            payload="$(gh api "repos/$repo/actions/runs/$run_id")"
            attempt="$(jq -r '.run_attempt' <<< "$payload")"
            artifact="nvs-staging-fixture-bootstrap-${run_id}-${attempt}"
            mkdir -p "$output_dir"
            downloaded='false'
            for _attempt in $(seq 1 20); do
              if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$output_dir" >/dev/null 2>&1; then
                downloaded='true'
                break
              fi
              sleep 5
            done
            [[ "$downloaded" == true ]]
            test -f "$output_dir/nvs-staging-fixture-bootstrap.md"
          }

          dispatch_and_find() {
            local operation="$1"
            local digest="$2"
            local confirmation="$3"
            local marker payload run_id
            marker="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            payload="$(jq -n \
              --arg ref main \
              --arg operation "$operation" \
              --arg environment_id "$ENVIRONMENT_ID" \
              --arg expected_sha "$TARGET_SHA" \
              --arg bootstrap_digest "$digest" \
              --arg confirmation "$confirmation" \
              '{ref:$ref,inputs:{operation:$operation,environment_id:$environment_id,expected_sha:$expected_sha,bootstrap_digest:$bootstrap_digest,confirmation:$confirmation}}')"
            gh api --method POST "repos/$repo/actions/workflows/$workflow/dispatches" --input - <<< "$payload"
            run_id=''
            for _attempt in $(seq 1 120); do
              run_id="$(gh api "repos/$repo/actions/workflows/$workflow/runs?event=workflow_dispatch&per_page=30" \
                --jq ".workflow_runs | map(select(.created_at >= \"$marker\")) | sort_by(.created_at) | .[0].id // empty" 2>/dev/null || true)"
              if [[ "$run_id" =~ ^[0-9]+$ ]]; then
                printf '%s\n' "$run_id"
                return 0
              fi
              sleep 3
            done
            return 1
          }

          operation_from_summary() {
            sed -n 's/^- Operation: `\([^`]*\)`$/\1/p' "$1" | head -n 1
          }

          result_from_summary() {
            sed -n 's/^- Result: `\([^`]*\)`$/\1/p' "$1" | head -n 1
          }

          plan_payload="$(gh api "repos/$repo/actions/runs/$PLAN_RUN")"
          plan_created="$(jq -r '.created_at' <<< "$plan_payload")"
          runs_json="$RUNNER_TEMP/recent-runs.json"
          gh api "repos/$repo/actions/workflows/$workflow/runs?event=workflow_dispatch&per_page=50" > "$runs_json"

          apply_run=''
          apply_source='dispatched'
          apply_summary="$RUNNER_TEMP/bootstrap-apply/nvs-staging-fixture-bootstrap.md"
          mapfile -t later_runs < <(jq -r --arg created "$plan_created" '.workflow_runs | map(select(.created_at > $created)) | sort_by(.created_at) | .[].id' "$runs_json")
          for candidate in "${later_runs[@]}"; do
            candidate_dir="$RUNNER_TEMP/candidate-$candidate"
            if download_summary "$candidate" "$candidate_dir"; then
              summary="$candidate_dir/nvs-staging-fixture-bootstrap.md"
              operation="$(operation_from_summary "$summary")"
              if [[ "$operation" == apply ]]; then
                apply_run="$candidate"
                apply_source='recovered'
                mkdir -p "$(dirname "$apply_summary")"
                cp "$summary" "$apply_summary"
              fi
            fi
          done

          if [[ -n "$apply_run" ]]; then
            apply_conclusion="$(jq -r --argjson id "$apply_run" '.workflow_runs[] | select(.id == $id) | .conclusion // ""' "$runs_json")"
            apply_result="$(result_from_summary "$apply_summary")"
            [[ "$apply_conclusion" == success ]]
            [[ "$apply_result" == PASS ]]
          else
            apply_run="$(dispatch_and_find apply "$BOOTSTRAP_DIGEST" BOOTSTRAP_M1_02B_FIXTURES)"
            apply_conclusion="$(wait_completed "$apply_run")"
            [[ "$apply_conclusion" == success ]]
            download_summary "$apply_run" "$RUNNER_TEMP/bootstrap-apply"
            apply_result="$(result_from_summary "$apply_summary")"
            [[ "$apply_result" == PASS ]]
          fi

          verify_run="$(dispatch_and_find plan '' '')"
          verify_conclusion="$(wait_completed "$verify_run")"
          [[ "$verify_conclusion" == success ]]
          download_summary "$verify_run" "$RUNNER_TEMP/bootstrap-verify"
          verify_summary="$RUNNER_TEMP/bootstrap-verify/nvs-staging-fixture-bootstrap.md"
          [[ "$(result_from_summary "$verify_summary")" == PASS ]]
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$verify_summary")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == NONE_ALREADY_READY ]]

          echo "apply_run=$apply_run" >> "$GITHUB_OUTPUT"
          echo "apply_source=$apply_source" >> "$GITHUB_OUTPUT"
          echo "verify_run=$verify_run" >> "$GITHUB_OUTPUT"

      - name: Publish sanitized completion or blocker evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OPERATE_OUTCOME: ${{ steps.operate.outcome }}
          APPLY_RUN: ${{ steps.operate.outputs.apply_run }}
          APPLY_SOURCE: ${{ steps.operate.outputs.apply_source }}
          VERIFY_RUN: ${{ steps.operate.outputs.verify_run }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-bootstrap-recovery.md"
          {
            echo '# Sanitized Configuration Approver bootstrap recovery'
            echo
            echo '- Reviewed implementation PR: `#72`'
            echo '- Full CI run: `29539983066` — production image, hardening, rollback, same-SHA, and checksum proof passed'
            echo '- CI chronology exception: PR merged at `2026-07-16T22:31:52Z`; CI completed successfully at `2026-07-16T22:40:32Z`'
            echo "- Clean implementation branch: \`fix/bootstrap-configuration-approver\` is identical to \`$TARGET_SHA\`"
            echo '- Successful exact-SHA staging deployment run: `29540003136`'
            echo "- Fresh authorized plan run: \`$PLAN_RUN\`"
            echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\` (\`${APPLY_SOURCE:-unavailable}\`)"
            echo "- Final idempotency verification run: \`${VERIFY_RUN:-unavailable}\`"
            echo "- Recovery outcome: \`$OPERATE_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- Exact SHA and `NVS_ENABLE_NILES_MUTATIONS != true`: verified by every staging-control run before execution'
            echo '- Live Incident acceptance: not executed'
            echo
            for pair in \
              'Authorized apply:bootstrap-apply/nvs-staging-fixture-bootstrap.md' \
              'Final verification:bootstrap-verify/nvs-staging-fixture-bootstrap.md'; do
              title="${pair%%:*}"
              file="${pair#*:}"
              echo "## $title"
              echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then
                cat "$RUNNER_TEMP/$file"
              else
                echo '**Sanitized artifact:** unavailable'
              fi
              echo
            done
          } > "$body"
          title='[Blocked] Configuration Approver apply recovery failed'
          if [[ "$OPERATE_OUTCOME" == success ]]; then
            title='[Closed] Configuration Approver bootstrap completed'
          fi
          gh issue edit 23 --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body"

      - name: Enforce successful recovery
        if: always()
        env:
          OPERATE_OUTCOME: ${{ steps.operate.outcome }}
        run: |
          set -euo pipefail
          [[ "$OPERATE_OUTCOME" == success ]]

  cleanup:
    needs: recover
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed recovery workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-recover-configuration-approver-apply.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-recover-configuration-approver-apply.yml
          git commit -m 'chore: remove completed configuration approver apply recovery workflow'
          git push origin HEAD:main
