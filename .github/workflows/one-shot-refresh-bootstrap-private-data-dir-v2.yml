name: one-shot refresh bootstrap private data directory branch v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml

permissions:
  contents: write

concurrency:
  group: nvs-one-shot-refresh-bootstrap-private-data-dir-v2
  cancel-in-progress: false

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/bootstrap-private-data-dir
          persist-credentials: true
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Merge current main, omit temporary assets, and validate clean implementation diff
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          rm -f \
            .github/workflows/one-shot-patch-bootstrap-private-data-dir.yml \
            .github/workflows/one-shot-refresh-bootstrap-private-data-dir.yml \
            .github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml
          git add -A
          if ! git diff --cached --quiet --exit-code; then
            git commit -m 'chore: omit temporary bootstrap branch refresh assets'
          fi
          test ! -e .github/workflows/one-shot-patch-bootstrap-private-data-dir.yml
          test ! -e .github/workflows/one-shot-refresh-bootstrap-private-data-dir.yml
          test ! -e .github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml' \
            'docs/operations/STAGING_FIXTURE_BOOTSTRAP.md' \
            'ops/staging-fixture-bootstrap.mjs' \
            'tests/staging-fixture-bootstrap-assets.test.ts' | sort)"
          [[ "$changed" == "$expected" ]]
          pnpm install --frozen-lockfile
          pnpm exec prettier --check \
            ops/staging-fixture-bootstrap.mjs \
            tests/staging-fixture-bootstrap-assets.test.ts \
            docs/operations/STAGING_FIXTURE_BOOTSTRAP.md
          node --check ops/staging-fixture-bootstrap.mjs
          pnpm exec eslint ops/staging-fixture-bootstrap.mjs tests/staging-fixture-bootstrap-assets.test.ts
          pnpm exec vitest run tests/staging-fixture-bootstrap-assets.test.ts
          pnpm run typecheck
          git diff --check origin/main...HEAD
          git push origin HEAD:fix/bootstrap-private-data-dir

  cleanup:
    needs: refresh
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed refresh workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git add .github/workflows/one-shot-refresh-bootstrap-private-data-dir-v2.yml
          git commit -m 'chore: remove completed bootstrap branch refresh workflow v2'
          git push origin HEAD:main
