name: one-shot refresh configuration approver plan

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-refresh-configuration-approver-plan.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-refresh-configuration-approver-plan
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      ENVIRONMENT_ID: staging-example
    steps:
      - name: Refresh plan, apply authorized digest, and prove idempotency
        id: operation
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          workflow='staging-fixture-bootstrap.yml'

          dispatch_run() {
            local operation="$1" digest="$2" confirmation="$3"
            local before payload run_id
            before="$(gh api "repos/$repo/actions/workflows/$workflow/runs?event=workflow_dispatch&per_page=1" --jq '.workflow_runs[0].id // 0')"
            payload="$(jq -n --arg operation "$operation" --arg environment_id "$ENVIRONMENT_ID" --arg expected_sha "$TARGET_SHA" --arg bootstrap_digest "$digest" --arg confirmation "$confirmation" '{ref:"main",inputs:{operation:$operation,environment_id:$environment_id,expected_sha:$expected_sha,bootstrap_digest:$bootstrap_digest,confirmation:$confirmation}}')"
            gh api --method POST "repos/$repo/actions/workflows/$workflow/dispatches" --input - <<< "$payload"
            run_id=''
            for _attempt in $(seq 1 120); do
              run_id="$(gh api "repos/$repo/actions/workflows/$workflow/runs?event=workflow_dispatch&per_page=10" --jq ".workflow_runs | map(select(.id != $before)) | sort_by(.created_at) | reverse | .[0].id // empty" 2>/dev/null || true)"
              [[ "$run_id" =~ ^[0-9]+$ ]] && { echo "$run_id"; return 0; }
              sleep 3
            done
            return 1
          }

          wait_run() {
            local run_id="$1" payload status conclusion
            for _attempt in $(seq 1 240); do
              payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
              if [[ -n "$payload" ]]; then
                status="$(jq -r '.status // ""' <<< "$payload")"
                conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
                if [[ "$status" == completed ]]; then echo "$conclusion"; return 0; fi
              fi
              sleep 5
            done
            echo timeout
          }

          summary_for() {
            local run_id="$1" target="$2" payload attempt artifact
            payload="$(gh api "repos/$repo/actions/runs/$run_id")"
            attempt="$(jq -r '.run_attempt' <<< "$payload")"
            artifact="nvs-staging-fixture-bootstrap-${run_id}-${attempt}"
            mkdir -p "$target"
            for _attempt in $(seq 1 20); do
              if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$target" >/dev/null 2>&1; then
                test -f "$target/nvs-staging-fixture-bootstrap.md"
                return 0
              fi
              sleep 5
            done
            return 1
          }

          result_of() { sed -n 's/^- Result: `\([^`]*\)`$/\1/p' "$1" | head -n 1; }

          plan_run="$(dispatch_run plan '' '')"
          [[ "$(wait_run "$plan_run")" == success ]]
          summary_for "$plan_run" "$RUNNER_TEMP/plan"
          plan_summary="$RUNNER_TEMP/plan/nvs-staging-fixture-bootstrap.md"
          [[ "$(result_of "$plan_summary")" == PASS ]]
          digest="$(sed -n 's/^- Bootstrap digest: `\([0-9a-f]\{64\}\)`$/\1/p' "$plan_summary" | head -n 1)"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          allowed='^(CREATE_ASSIGNMENT_GROUP|ADD_SERVICE_DESK_MEMBER|CREATE_CI_CLASS|CREATE_CMDB_SERVICE|CREATE_CONFIGURATION_APPROVER|RECOVER_CONFIGURATION_APPROVER|CREATE_AND_PUBLISH_GOVERNED_SLA|COMPLETE_GOVERNED_SLA_PUBLISH|CREATE_SERVICE_OFFERING|CREATE_CONFIGURATION_ITEM|NONE_ALREADY_READY)$'
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$plan_summary")
          [[ "${#actions[@]}" -ge 1 ]]
          for action in "${actions[@]}"; do [[ "$action" =~ $allowed ]]; done

          already_ready='false'
          apply_run='not-required'
          if [[ "${#actions[@]}" -eq 1 && "${actions[0]}" == NONE_ALREADY_READY ]]; then
            already_ready='true'
          else
            apply_run="$(dispatch_run apply "$digest" BOOTSTRAP_M1_02B_FIXTURES)"
            apply_conclusion="$(wait_run "$apply_run")"
            summary_for "$apply_run" "$RUNNER_TEMP/apply"
            apply_summary="$RUNNER_TEMP/apply/nvs-staging-fixture-bootstrap.md"
            [[ "$apply_conclusion" == success ]]
            [[ "$(result_of "$apply_summary")" == PASS ]]
          fi

          verify_run="$(dispatch_run plan '' '')"
          [[ "$(wait_run "$verify_run")" == success ]]
          summary_for "$verify_run" "$RUNNER_TEMP/verify"
          verify_summary="$RUNNER_TEMP/verify/nvs-staging-fixture-bootstrap.md"
          [[ "$(result_of "$verify_summary")" == PASS ]]
          mapfile -t final_actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$verify_summary")
          [[ "${#final_actions[@]}" -eq 1 ]]
          [[ "${final_actions[0]}" == NONE_ALREADY_READY ]]

          echo "plan_run=$plan_run" >> "$GITHUB_OUTPUT"
          echo "apply_run=$apply_run" >> "$GITHUB_OUTPUT"
          echo "verify_run=$verify_run" >> "$GITHUB_OUTPUT"
          echo "already_ready=$already_ready" >> "$GITHUB_OUTPUT"

      - name: Publish sanitized result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OPERATION_OUTCOME: ${{ steps.operation.outcome }}
          PLAN_RUN: ${{ steps.operation.outputs.plan_run }}
          APPLY_RUN: ${{ steps.operation.outputs.apply_run }}
          VERIFY_RUN: ${{ steps.operation.outputs.verify_run }}
          ALREADY_READY: ${{ steps.operation.outputs.already_ready }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-refresh-result.md"
          {
            echo '# Sanitized Configuration Approver refreshed bootstrap result'
            echo
            echo '- Reviewed implementation PR: `#72`'
            echo '- Full CI run: `29539983066` — production image, hardening, rollback, same-SHA, and checksum proof passed'
            echo '- CI chronology exception: PR merged before that successful CI run completed'
            echo '- Exact-SHA staging deployment run: `29540003136`'
            echo "- Deployed SHA: \`$TARGET_SHA\`"
            echo "- Fresh plan run: \`${PLAN_RUN:-unavailable}\`"
            echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\`"
            echo "- Final idempotency plan run: \`${VERIFY_RUN:-unavailable}\`"
            echo "- Outcome: \`$OPERATION_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- `NVS_ENABLE_NILES_MUTATIONS`: remained disabled; staging-control rejected execution if enabled'
            echo '- Live Incident acceptance: not executed'
            echo
            for pair in 'Fresh plan:plan/nvs-staging-fixture-bootstrap.md' 'Authorized apply:apply/nvs-staging-fixture-bootstrap.md' 'Final verification:verify/nvs-staging-fixture-bootstrap.md'; do
              title="${pair%%:*}"; file="${pair#*:}"
              echo "## $title"; echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then cat "$RUNNER_TEMP/$file"; elif [[ "$title" == 'Authorized apply' && "$ALREADY_READY" == true ]]; then echo '**Not required:** state was already ready.'; else echo '**Sanitized artifact:** unavailable'; fi
              echo
            done
          } > "$body"
          title='[Blocked] Configuration Approver refreshed bootstrap failed'
          [[ "$OPERATION_OUTCOME" == success ]] && title='[Closed] Configuration Approver bootstrap completed'
          gh issue edit 23 --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body"

      - name: Enforce completion
        if: always()
        env:
          OPERATION_OUTCOME: ${{ steps.operation.outcome }}
        run: |
          set -euo pipefail
          [[ "$OPERATION_OUTCOME" == success ]]

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed refresh workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-refresh-configuration-approver-plan.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-refresh-configuration-approver-plan.yml
          git commit -m 'chore: remove completed configuration approver refresh workflow'
          git push origin HEAD:main
