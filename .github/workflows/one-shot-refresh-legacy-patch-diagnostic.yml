name: one-shot refresh legacy patch diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-refresh-legacy-patch-diagnostic.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh temporary sanitized diagnostic issue
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RUN_ID: '29493290355'
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          run_json="$(gh run view "$TARGET_RUN_ID" --repo "$repo" --json databaseId,status,conclusion,headSha,url,createdAt,name,workflowName)"
          raw="$RUNNER_TEMP/pr20-ci-failed.log"
          safe="$RUNNER_TEMP/pr20-ci-failed-safe.log"
          gh run view "$TARGET_RUN_ID" --repo "$repo" --log-failed > "$raw"
          tail -n 160 "$raw" \
            | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
            > "$safe"
          body="$RUNNER_TEMP/pr20-ci-diagnostic.md"
          {
            echo 'Temporary sanitized diagnostic for the latest PR #20 CI failure.'
            echo
            echo '```json'
            printf '%s\n' "$run_json"
            echo '```'
            echo
            echo '```text'
            cat "$safe"
            echo '```'
          } > "$body"
          gh issue edit 22 --repo "$repo" --body-file "$body" >/dev/null
