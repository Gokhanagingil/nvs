name: one-shot refresh legacy patch diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-refresh-legacy-patch-diagnostic.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh temporary sanitized diagnostic issue
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_HEAD_SHA: '11dfb8182b3c1f7043a9fd12d314871fc88fe681'
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          runs_json="$(gh run list \
            --repo "$repo" \
            --limit 100 \
            --json databaseId,status,conclusion,headSha,url,createdAt,name,workflowName)"
          run_json="$(printf '%s' "$runs_json" | jq -c --arg sha "$TARGET_HEAD_SHA" '[.[] | select(.headSha == $sha and (.name == "one-shot apply legacy assignment patch" or .workflowName == ".github/workflows/one-shot-apply-legacy-assignment-patch.yml"))][0]')"
          raw="$RUNNER_TEMP/legacy-patch-failed.log"
          safe="$RUNNER_TEMP/legacy-patch-failed-safe.log"
          if [[ "$run_json" == 'null' ]]; then
            printf '%s\n' 'No one-shot legacy patch workflow run exists for the exact target commit.' > "$safe"
          else
            run_id="$(printf '%s' "$run_json" | jq -r '.databaseId')"
            set +e
            gh run view "$run_id" --repo "$repo" --log-failed > "$raw"
            log_status=$?
            set -e
            if [[ "$log_status" -eq 0 ]]; then
              tail -n 120 "$raw" \
                | sed -E 's/(authorization:|bearer |password|token)[^ ]*/\1 [redacted]/Ig' \
                > "$safe"
            else
              printf '%s\n' 'No failed log is available; the workflow may still be running or may have succeeded.' > "$safe"
            fi
          fi
          body="$RUNNER_TEMP/legacy-patch-diagnostic.md"
          {
            echo 'Temporary sanitized diagnostic for the exact legacy assignment patch workflow run.'
            echo
            echo '```json'
            printf '%s\n' "$run_json"
            echo '```'
            echo
            echo '```text'
            cat "$safe"
            echo '```'
          } > "$body"
          gh issue edit 22 --repo "$repo" --body-file "$body" >/dev/null
