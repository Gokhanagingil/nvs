name: one-shot report legacy patch status

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-report-legacy-patch-status.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish sanitized workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          result="$(gh run list \
            --repo "$repo" \
            --workflow one-shot-apply-legacy-assignment-patch.yml \
            --limit 5 \
            --json databaseId,status,conclusion,headSha,url,createdAt \
            --jq '.')"
          body_file="$RUNNER_TEMP/legacy-patch-status.md"
          {
            echo '## Legacy assignment patch workflow status'
            echo
            echo '```json'
            printf '%s\n' "$result"
            echo '```'
          } > "$body_file"
          gh api \
            --method POST \
            "repos/${repo}/issues/9/comments" \
            --raw-field "body=$(cat "$body_file")" \
            >/dev/null
