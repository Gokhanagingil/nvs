name: one-shot retry authorized staging fixture bootstrap

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-retry-authorized-bootstrap.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-bootstrap-retry
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check out main for self-cleanup
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Run fresh plan and authorized apply
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: 30617d6c576b921607c607c27a2a4d401a1303ed
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          result_root="$RUNNER_TEMP/bootstrap-retry"
          mkdir -p "$result_root"

          latest_run() {
            gh run list \
              --repo "$repo" \
              --workflow staging-fixture-bootstrap.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0'
          }

          wait_for_new_run() {
            local previous="$1"
            local candidate=''
            for _attempt in $(seq 1 60); do
              sleep 2
              candidate="$(latest_run)"
              if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then
                printf '%s' "$candidate"
                return 0
              fi
            done
            return 1
          }

          previous="$(latest_run)"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id=staging-example \
            --field expected_sha="$EXPECTED_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          plan_run="$(wait_for_new_run "$previous")"

          set +e
          gh run watch "$plan_run" --repo "$repo" --exit-status
          plan_status=$?
          set -e
          gh run download "$plan_run" \
            --repo "$repo" \
            --name "nvs-staging-fixture-bootstrap-${plan_run}-1" \
            --dir "$result_root/plan"

          plan_file="$result_root/plan/nvs-staging-fixture-bootstrap.md"
          digest="$(python3 - "$plan_file" <<'PY'
          import pathlib, re, sys
          text = pathlib.Path(sys.argv[1]).read_text(encoding='utf-8')
          if '- Result: `PASS`' not in text:
              raise SystemExit('fresh bootstrap plan did not return PASS')
          match = re.search(r'- Bootstrap digest: `([0-9a-f]{64})`', text)
          if not match:
              raise SystemExit('fresh bootstrap plan did not expose a digest')
          allowed = {
              'CREATE_ASSIGNMENT_GROUP',
              'ADD_SERVICE_DESK_MEMBER',
              'CREATE_CI_CLASS',
              'CREATE_CMDB_SERVICE',
              'CREATE_CHOICE_PENDINGREASON',
              'CREATE_CHOICE_RELATIONSHIPTYPE',
              'CREATE_CHOICE_IMPACTSCOPE',
              'CREATE_AND_PUBLISH_GOVERNED_SLA',
              'COMPLETE_GOVERNED_SLA_PUBLISH',
              'CREATE_SERVICE_OFFERING',
              'CREATE_CONFIGURATION_ITEM',
              'NONE_ALREADY_READY',
          }
          actions = set(re.findall(r'^- `([A-Z0-9_]+)`$', text, re.MULTILINE))
          unexpected = sorted(actions - allowed)
          if unexpected:
              raise SystemExit(f'unexpected bootstrap actions: {unexpected}')
          print(match.group(1))
          PY
          )"
          [[ "$plan_status" -eq 0 ]]
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]

          previous="$(latest_run)"
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=apply \
            --field environment_id=staging-example \
            --field expected_sha="$EXPECTED_SHA" \
            --field bootstrap_digest="$digest" \
            --field confirmation=BOOTSTRAP_M1_02B_FIXTURES
          apply_run="$(wait_for_new_run "$previous")"

          set +e
          gh run watch "$apply_run" --repo "$repo" --exit-status
          apply_status=$?
          set -e
          gh run download "$apply_run" \
            --repo "$repo" \
            --name "nvs-staging-fixture-bootstrap-${apply_run}-1" \
            --dir "$result_root/apply"

          body="$RUNNER_TEMP/bootstrap-retry-result.md"
          {
            echo '# Sanitized authorized bootstrap retry result'
            echo
            echo "- Plan run: \`$plan_run\`"
            echo "- Plan exit status: \`$plan_status\`"
            echo "- Apply run: \`$apply_run\`"
            echo "- Apply exit status: \`$apply_status\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo
            echo '## Fresh plan'
            echo
            cat "$plan_file"
            echo
            echo '## Authorized apply'
            echo
            cat "$result_root/apply/nvs-staging-fixture-bootstrap.md"
          } > "$body"

          gh issue edit 23 \
            --repo "$repo" \
            --title '[Closed] Sanitized authorized bootstrap retry result' \
            --body-file "$body"

          exit "$apply_status"

  cleanup:
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove this one-shot workflow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Commit self-removal
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-retry-authorized-bootstrap.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-retry-authorized-bootstrap.yml
          git commit -m 'chore: remove completed authorized bootstrap retry'
          git push origin HEAD:main
