name: one-shot run configuration approver bootstrap

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-run-configuration-approver-bootstrap.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: nvs-one-shot-run-configuration-approver-bootstrap
  cancel-in-progress: false

jobs:
  operate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_SHA: 921198f636b60b00d4eff143570bba38914a7440
      ENVIRONMENT_ID: staging-example
    steps:
      - name: Run fresh deterministic plan
        id: plan
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"

          latest_run() {
            local value='0'
            for _attempt in $(seq 1 12); do
              value="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
              [[ "$value" =~ ^[0-9]+$ ]] && { echo "$value"; return 0; }
              sleep 5
            done
            echo 0
          }

          wait_completed() {
            local run_id="$1"
            local payload status conclusion
            for _attempt in $(seq 1 240); do
              payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
              if [[ -n "$payload" ]]; then
                status="$(jq -r '.status // ""' <<< "$payload")"
                conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
                if [[ "$status" == 'completed' ]]; then
                  echo "$conclusion"
                  return 0
                fi
              fi
              sleep 5
            done
            echo timeout
          }

          previous="$(latest_run)"
          set +e
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          dispatch_status=$?
          set -e

          run_id=''
          for _attempt in $(seq 1 120); do
            candidate="$(latest_run)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
            sleep 3
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion="$(wait_completed "$run_id")"
          [[ "$conclusion" == 'success' ]]

          payload="$(gh api "repos/$repo/actions/runs/$run_id")"
          run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
          result_dir="$RUNNER_TEMP/bootstrap-plan"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          downloaded='false'
          for _attempt in $(seq 1 20); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then downloaded='true'; break; fi
            sleep 5
          done
          [[ "$downloaded" == 'true' ]]
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          digest="$(sed -n 's/^- Bootstrap digest: `\([0-9a-f]\{64\}\)`$/\1/p' "$summary" | head -n 1)"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]

          allowed='^(CREATE_ASSIGNMENT_GROUP|ADD_SERVICE_DESK_MEMBER|CREATE_CI_CLASS|CREATE_CMDB_SERVICE|CREATE_CONFIGURATION_APPROVER|RECOVER_CONFIGURATION_APPROVER|CREATE_AND_PUBLISH_GOVERNED_SLA|COMPLETE_GOVERNED_SLA_PUBLISH|CREATE_SERVICE_OFFERING|CREATE_CONFIGURATION_ITEM|NONE_ALREADY_READY)$'
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -ge 1 ]]
          for action in "${actions[@]}"; do [[ "$action" =~ $allowed ]]; done

          already_ready='false'
          if [[ "${#actions[@]}" -eq 1 && "${actions[0]}" == 'NONE_ALREADY_READY' ]]; then already_ready='true'; fi
          cp "$summary" "$RUNNER_TEMP/bootstrap-plan.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "already_ready=$already_ready" >> "$GITHUB_OUTPUT"
          echo "dispatch_status=$dispatch_status" >> "$GITHUB_OUTPUT"

      - name: Apply authorized deterministic fixtures
        id: apply
        if: steps.plan.outcome == 'success' && steps.plan.outputs.already_ready != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOOTSTRAP_DIGEST: ${{ steps.plan.outputs.digest }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          [[ "$BOOTSTRAP_DIGEST" =~ ^[0-9a-f]{64}$ ]]

          latest_run() {
            local value='0'
            for _attempt in $(seq 1 12); do
              value="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
              [[ "$value" =~ ^[0-9]+$ ]] && { echo "$value"; return 0; }
              sleep 5
            done
            echo 0
          }
          wait_completed() {
            local run_id="$1"
            local payload status conclusion
            for _attempt in $(seq 1 240); do
              payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
              if [[ -n "$payload" ]]; then
                status="$(jq -r '.status // ""' <<< "$payload")"
                conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
                if [[ "$status" == 'completed' ]]; then echo "$conclusion"; return 0; fi
              fi
              sleep 5
            done
            echo timeout
          }

          previous="$(latest_run)"
          set +e
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=apply \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest="$BOOTSTRAP_DIGEST" \
            --field confirmation=BOOTSTRAP_M1_02B_FIXTURES
          dispatch_status=$?
          set -e

          run_id=''
          for _attempt in $(seq 1 120); do
            candidate="$(latest_run)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
            sleep 3
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion="$(wait_completed "$run_id")"
          [[ "$conclusion" == 'success' ]]

          payload="$(gh api "repos/$repo/actions/runs/$run_id")"
          run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
          result_dir="$RUNNER_TEMP/bootstrap-apply"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          downloaded='false'
          for _attempt in $(seq 1 20); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then downloaded='true'; break; fi
            sleep 5
          done
          [[ "$downloaded" == 'true' ]]
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          cp "$summary" "$RUNNER_TEMP/bootstrap-apply.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "dispatch_status=$dispatch_status" >> "$GITHUB_OUTPUT"

      - name: Verify final idempotent ready state
        id: verify
        if: steps.plan.outcome == 'success' && (steps.plan.outputs.already_ready == 'true' || steps.apply.outcome == 'success')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"

          latest_run() {
            local value='0'
            for _attempt in $(seq 1 12); do
              value="$(gh run list --repo "$repo" --workflow staging-fixture-bootstrap.yml --branch main --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0' 2>/dev/null || echo 0)"
              [[ "$value" =~ ^[0-9]+$ ]] && { echo "$value"; return 0; }
              sleep 5
            done
            echo 0
          }
          wait_completed() {
            local run_id="$1"
            local payload status conclusion
            for _attempt in $(seq 1 240); do
              payload="$(gh api "repos/$repo/actions/runs/$run_id" 2>/dev/null || true)"
              if [[ -n "$payload" ]]; then
                status="$(jq -r '.status // ""' <<< "$payload")"
                conclusion="$(jq -r '.conclusion // ""' <<< "$payload")"
                if [[ "$status" == 'completed' ]]; then echo "$conclusion"; return 0; fi
              fi
              sleep 5
            done
            echo timeout
          }

          previous="$(latest_run)"
          set +e
          gh workflow run staging-fixture-bootstrap.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id="$ENVIRONMENT_ID" \
            --field expected_sha="$TARGET_SHA" \
            --field bootstrap_digest='' \
            --field confirmation=''
          dispatch_status=$?
          set -e

          run_id=''
          for _attempt in $(seq 1 120); do
            candidate="$(latest_run)"
            if [[ "$candidate" != '0' && "$candidate" != "$previous" ]]; then run_id="$candidate"; break; fi
            sleep 3
          done
          [[ "$run_id" =~ ^[0-9]+$ ]]
          conclusion="$(wait_completed "$run_id")"
          [[ "$conclusion" == 'success' ]]

          payload="$(gh api "repos/$repo/actions/runs/$run_id")"
          run_attempt="$(jq -r '.run_attempt' <<< "$payload")"
          result_dir="$RUNNER_TEMP/bootstrap-verify"
          mkdir -p "$result_dir"
          artifact="nvs-staging-fixture-bootstrap-${run_id}-${run_attempt}"
          downloaded='false'
          for _attempt in $(seq 1 20); do
            if gh run download "$run_id" --repo "$repo" --name "$artifact" --dir "$result_dir"; then downloaded='true'; break; fi
            sleep 5
          done
          [[ "$downloaded" == 'true' ]]
          summary="$result_dir/nvs-staging-fixture-bootstrap.md"
          test -f "$summary"
          grep -Fq -- '- Result: `PASS`' "$summary"
          mapfile -t actions < <(awk '/^## Planned actions$/ { active=1; next } /^## / && active { exit } active && /^- `[^`]+`$/ { line=$0; sub(/^- `/, "", line); sub(/`$/, "", line); print line }' "$summary")
          [[ "${#actions[@]}" -eq 1 ]]
          [[ "${actions[0]}" == 'NONE_ALREADY_READY' ]]
          cp "$summary" "$RUNNER_TEMP/bootstrap-verify.md"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "dispatch_status=$dispatch_status" >> "$GITHUB_OUTPUT"

      - name: Publish sanitized completion evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PLAN_RUN: ${{ steps.plan.outputs.run_id }}
          APPLY_RUN: ${{ steps.apply.outputs.run_id }}
          VERIFY_RUN: ${{ steps.verify.outputs.run_id }}
          ALREADY_READY: ${{ steps.plan.outputs.already_ready }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/configuration-approver-bootstrap-completion.md"
          {
            echo '# Sanitized Configuration Approver bootstrap completion'
            echo
            echo '- Reviewed implementation PR: `#72`'
            echo '- Full CI run: `29539983066` — production image, hardening, rollback, same-SHA, and checksum proof passed'
            echo '- CI chronology exception: PR merged at `2026-07-16T22:31:52Z`; CI completed successfully at `2026-07-16T22:40:32Z`'
            echo "- Clean implementation branch: \`fix/bootstrap-configuration-approver\` is identical to \`$TARGET_SHA\`"
            echo "- Successful exact-SHA deployment run: \`29540003136\`"
            echo "- Deployed exact SHA: \`$TARGET_SHA\`"
            echo "- Fresh plan run: \`${PLAN_RUN:-unavailable}\` — \`$PLAN_OUTCOME\`"
            if [[ "$ALREADY_READY" == 'true' ]]; then
              echo '- Authorized apply: not required; fresh plan was already fully ready'
            else
              echo "- Authorized apply run: \`${APPLY_RUN:-unavailable}\` — \`$APPLY_OUTCOME\`"
            fi
            echo "- Final idempotency verification run: \`${VERIFY_RUN:-unavailable}\` — \`$VERIFY_OUTCOME\`"
            echo '- Authorization: `BOOTSTRAP_M1_02B_FIXTURES`'
            echo '- Exact SHA and `NVS_ENABLE_NILES_MUTATIONS != true`: verified before every staging-control execution'
            echo '- Live Incident acceptance: not executed'
            echo
            for pair in \
              'Fresh plan:bootstrap-plan.md' \
              'Authorized apply:bootstrap-apply.md' \
              'Final verification:bootstrap-verify.md'; do
              title="${pair%%:*}"
              file="${pair#*:}"
              echo "## $title"
              echo
              if [[ -f "$RUNNER_TEMP/$file" ]]; then
                cat "$RUNNER_TEMP/$file"
              elif [[ "$title" == 'Authorized apply' && "$ALREADY_READY" == 'true' ]]; then
                echo '**Not required:** the fresh plan reported only `NONE_ALREADY_READY`.'
              else
                echo '**Sanitized artifact:** unavailable'
              fi
              echo
            done
          } > "$body"

          title='[Blocked] Configuration Approver bootstrap run failed'
          if [[ "$PLAN_OUTCOME" == 'success' && ( "$ALREADY_READY" == 'true' || "$APPLY_OUTCOME" == 'success' ) && "$VERIFY_OUTCOME" == 'success' ]]; then
            title='[Closed] Configuration Approver bootstrap completed'
          fi
          gh issue edit 23 --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body"

      - name: Enforce successful completion
        if: always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          ALREADY_READY: ${{ steps.plan.outputs.already_ready }}
        run: |
          set -euo pipefail
          [[ "$PLAN_OUTCOME" == 'success' ]]
          if [[ "$ALREADY_READY" != 'true' ]]; then [[ "$APPLY_OUTCOME" == 'success' ]]; fi
          [[ "$VERIFY_OUTCOME" == 'success' ]]

  cleanup:
    needs: operate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - name: Remove completed runner workflow
        run: |
          set -euo pipefail
          git config user.name 'nvs-maintenance-bot'
          git config user.email 'nvs-maintenance-bot@users.noreply.github.com'
          git pull --ff-only origin main
          rm -f .github/workflows/one-shot-run-configuration-approver-bootstrap.yml
          if git diff --quiet --exit-code; then exit 0; fi
          git add .github/workflows/one-shot-run-configuration-approver-bootstrap.yml
          git commit -m 'chore: remove completed configuration approver bootstrap runner workflow'
          git push origin HEAD:main
