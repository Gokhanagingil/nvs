name: one-shot staging fixture plan diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-staging-fixture-plan.yml

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: nvs-one-shot-fixture-plan-diagnostic
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch a fresh sanitized fixture plan and publish its result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          previous_run_id="$(
            gh run list \
              --repo "$repo" \
              --workflow staging-fixture.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0'
          )"

          gh workflow run staging-fixture.yml \
            --repo "$repo" \
            --ref main \
            --field operation=plan \
            --field environment_id=staging-example \
            --field expected_sha=09be26944f836fadca0b564f6516e86600d6c04b \
            --field assignment_group_query='service desk' \
            --field service_query=payment \
            --field offering_query=payment \
            --field ci_query=payment \
            --field proposal_digest='' \
            --field confirmation=''

          run_id=''
          for _attempt in $(seq 1 30); do
            sleep 2
            candidate="$(
              gh run list \
                --repo "$repo" \
                --workflow staging-fixture.yml \
                --branch main \
                --event workflow_dispatch \
                --limit 1 \
                --json databaseId \
                --jq '.[0].databaseId // 0'
            )"
            if [[ "$candidate" != '0' && "$candidate" != "$previous_run_id" ]]; then
              run_id="$candidate"
              break
            fi
          done
          if [[ -z "$run_id" ]]; then
            echo 'A fresh staging fixture workflow run could not be identified.' >&2
            exit 1
          fi

          set +e
          gh run watch "$run_id" --repo "$repo" --exit-status
          target_status=$?
          set -e

          result_dir="$RUNNER_TEMP/staging-fixture-result"
          artifact_name="nvs-staging-fixture-${run_id}-1"
          mkdir -p "$result_dir"
          download_status=0
          gh run download "$run_id" \
            --repo "$repo" \
            --name "$artifact_name" \
            --dir "$result_dir" || download_status=$?

          comment_file="$RUNNER_TEMP/staging-fixture-comment.md"
          {
            echo '## Fresh staging fixture plan diagnostic'
            echo
            echo "- Workflow run ID: \`$run_id\`"
            echo "- Workflow exit status: \`$target_status\`"
            echo
            if [[ "$download_status" -eq 0 && -f "$result_dir/nvs-staging-fixture.md" ]]; then
              cat "$result_dir/nvs-staging-fixture.md"
            else
              echo '**Result:** DIAGNOSTIC_ARTIFACT_UNAVAILABLE'
              echo
              echo 'The fresh workflow completed, but its sanitized result artifact could not be downloaded.'
            fi
          } > "$comment_file"

          gh api \
            --method POST \
            "repos/${repo}/issues/9/comments" \
            --raw-field "body=$(cat "$comment_file")" \
            >/dev/null
