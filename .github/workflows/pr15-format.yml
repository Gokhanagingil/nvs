name: format PR15 assets

on:
  push:
    branches:
      - agent/staging-live-acceptance
    paths:
      - .github/workflows/pr15-format.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/staging-live-acceptance
          persist-credentials: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.13.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format changed assets
        run: |
          pnpm exec prettier --write \
            .github/workflows/staging-fixture.yml \
            .github/workflows/staging-live-acceptance.yml \
            tests/staging-operator-assets.test.ts \
            tests/staging-live-acceptance-assets.test.ts
      - name: Commit formatting and remove one-time workflow
        run: |
          rm -f .github/workflows/pr15-format.yml
          git config user.name "nvs-maintenance-bot"
          git config user.email "nvs-maintenance-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: format live acceptance assets"
          git push origin HEAD:agent/staging-live-acceptance
