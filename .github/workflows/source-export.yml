name: source-export

on:
  push:
    branches:
      - agent/m1-02b-real-incident-api
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
      - name: Install locked dependencies
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
          pnpm install --frozen-lockfile --ignore-scripts
      - name: Package reviewed source
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=artifacts \
            --exclude=playwright-report \
            --exclude=test-results \
            -czf "$RUNNER_TEMP/nvs-source.tar.gz" .
      - name: Package locked dependency tree
        run: |
          find . -type d -name node_modules -prune -print0 | \
            tar --null -T - -czf "$RUNNER_TEMP/nvs-node-modules.tar.gz"
      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nvs-source-${{ github.sha }}
          path: ${{ runner.temp }}/nvs-source.tar.gz
          if-no-files-found: error
          retention-days: 1
      - name: Upload dependency archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nvs-node-modules-${{ github.sha }}
          path: ${{ runner.temp }}/nvs-node-modules.tar.gz
          if-no-files-found: error
          retention-days: 1
