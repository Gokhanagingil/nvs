name: staging live acceptance

on:
  workflow_dispatch:
    inputs:
      environment_id:
        description: Approved non-production NVS environment
        required: true
        default: staging-example
        type: string
      expected_sha:
        description: Currently deployed full NVS Git SHA
        required: true
        default: 09be26944f836fadca0b564f6516e86600d6c04b
        type: string
      confirmation:
        description: Enter RUN_M1_02B_LIVE_INCIDENT
        required: true
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: nvs-staging-control
  cancel-in-progress: false

jobs:
  acceptance:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    steps:
      - name: Check out reviewed acceptance tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Validate live acceptance inputs
        env:
          ENVIRONMENT_ID: ${{ inputs.environment_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          python3 - <<'PY'
          import os
          import re

          if not re.fullmatch(r"[a-z0-9][a-z0-9._-]{0,95}", os.environ["ENVIRONMENT_ID"]):
              raise SystemExit("Invalid NVS environment identifier.")
          if not re.fullmatch(r"[0-9a-f]{40}", os.environ["EXPECTED_SHA"]):
              raise SystemExit("expected_sha must be a full lowercase Git SHA.")
          if os.environ["CONFIRMATION"] != "RUN_M1_02B_LIVE_INCIDENT":
              raise SystemExit("The exact live Incident confirmation phrase is required.")
          PY

      - name: Configure pinned SSH trust
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          SSH_KEY_B64: ${{ secrets.NVS_STAGING_SSH_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.NVS_STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]{0,31}$ ]]
          test -n "$SSH_KEY_B64"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s' "$SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/id_nvs_staging"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_nvs_staging" "$HOME/.ssh/known_hosts"

      - name: Transfer reviewed live acceptance runners
        id: remote
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="${SSH_USER}@${SSH_HOST}"
          remote_dir="/tmp/nvs-live-acceptance-${RUN_ID}-${RUN_ATTEMPT}"
          ssh "${ssh_options[@]}" "$remote" "install -d -m 0700 '$remote_dir'"
          scp "${ssh_options[@]}" \
            ops/staging-live-preflight.py \
            ops/staging-live-acceptance.py \
            "${remote}:${remote_dir}/"
          echo "remote_dir=$remote_dir" >> "$GITHUB_OUTPUT"

      - name: Prove fixture readiness before mutation lease
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          ENVIRONMENT_ID: ${{ inputs.environment_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          REMOTE_DIR: ${{ steps.remote.outputs.remote_dir }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          printf -v environment_q '%q' "$ENVIRONMENT_ID"
          printf -v expected_q '%q' "$EXPECTED_SHA"
          ssh "${ssh_options[@]}" "${SSH_USER}@${SSH_HOST}" \
            "python3 '$REMOTE_DIR/staging-live-preflight.py' --environment-id $environment_q --expected-sha $expected_q"

      - name: Execute one guarded real Incident journey
        id: live
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          ENVIRONMENT_ID: ${{ inputs.environment_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REMOTE_DIR: ${{ steps.remote.outputs.remote_dir }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="${SSH_USER}@${SSH_HOST}"
          live_run_id="m1-02b-gh-${RUN_ID}-${RUN_ATTEMPT}"
          lease_id="gh-${RUN_ID}-${RUN_ATTEMPT}"
          output_file="$RUNNER_TEMP/nvs-live-acceptance.md"
          printf -v environment_q '%q' "$ENVIRONMENT_ID"
          printf -v expected_q '%q' "$EXPECTED_SHA"
          printf -v confirmation_q '%q' "$CONFIRMATION"
          printf -v live_run_q '%q' "$live_run_id"
          printf -v lease_q '%q' "$lease_id"

          set +e
          ssh "${ssh_options[@]}" "$remote" \
            "python3 '$REMOTE_DIR/staging-live-acceptance.py' run --environment-id $environment_q --expected-sha $expected_q --run-id $live_run_q --lease-id $lease_q --confirmation $confirmation_q" \
            >"$output_file"
          status=$?
          set -e

          cat "$output_file"
          {
            echo
            cat "$output_file"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "lease_id=$lease_id" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Enforce mutation switch cleanup
        if: always() && steps.remote.outputs.remote_dir != ''
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          REMOTE_DIR: ${{ steps.remote.outputs.remote_dir }}
          LEASE_ID: ${{ steps.live.outputs.lease_id }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="${SSH_USER}@${SSH_HOST}"
          printf -v lease_q '%q' "$LEASE_ID"
          ssh "${ssh_options[@]}" "$remote" \
            "python3 '$REMOTE_DIR/staging-live-acceptance.py' force-disable --lease-id $lease_q"

      - name: Remove temporary operator material
        if: always()
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          REMOTE_DIR: ${{ steps.remote.outputs.remote_dir }}
        run: |
          set -euo pipefail
          if [[ -n "$REMOTE_DIR" ]]; then
            ssh_options=(
              -i "$HOME/.ssh/id_nvs_staging"
              -o BatchMode=yes
              -o IdentitiesOnly=yes
              -o StrictHostKeyChecking=yes
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            )
            ssh "${ssh_options[@]}" "${SSH_USER}@${SSH_HOST}" "rm -rf '$REMOTE_DIR'" || true
          fi
          rm -rf "$HOME/.ssh"
