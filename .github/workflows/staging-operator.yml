name: staging operator

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Safe staging operation
        required: true
        default: verify
        type: choice
        options:
          - verify
          - discover
      environment_id:
        description: NVS environment identifier
        required: true
        default: staging-example
        type: string
      expected_sha:
        description: Optional deployed 40-character Git SHA for verify
        required: false
        default: ''
        type: string
      query:
        description: Optional discovery search text (maximum 100 printable characters)
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: nvs-staging-operator
  cancel-in-progress: false

jobs:
  operator:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - name: Check out reviewed operator code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Validate operator inputs
        env:
          OPERATION: ${{ inputs.operation }}
          ENVIRONMENT_ID: ${{ inputs.environment_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          QUERY: ${{ inputs.query }}
        run: |
          python3 - <<'PY'
          import os
          import re

          operation = os.environ["OPERATION"]
          environment_id = os.environ["ENVIRONMENT_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]
          query = os.environ["QUERY"]

          if operation not in {"verify", "discover"}:
              raise SystemExit("Unsupported staging operator operation.")
          if not re.fullmatch(r"[a-z0-9][a-z0-9._-]{0,95}", environment_id):
              raise SystemExit("Invalid NVS environment identifier.")
          if expected_sha and not re.fullmatch(r"[0-9a-f]{40}", expected_sha):
              raise SystemExit("expected_sha must be empty or a full lowercase Git SHA.")
          if len(query) > 100 or any(ord(character) < 32 for character in query):
              raise SystemExit("query must be at most 100 printable characters.")
          PY

      - name: Configure pinned SSH trust
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          SSH_KEY_B64: ${{ secrets.NVS_STAGING_SSH_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.NVS_STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]{0,31}$ ]]
          test -n "$SSH_KEY_B64"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s' "$SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/id_nvs_staging"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_nvs_staging" "$HOME/.ssh/known_hosts"

      - name: Run sanitized staging operation
        id: operator
        env:
          SSH_HOST: ${{ secrets.NVS_STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.NVS_STAGING_SSH_USER }}
          OPERATION: ${{ inputs.operation }}
          ENVIRONMENT_ID: ${{ inputs.environment_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          QUERY: ${{ inputs.query }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ssh_options=(
            -i "$HOME/.ssh/id_nvs_staging"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="${SSH_USER}@${SSH_HOST}"
          remote_dir="/tmp/nvs-staging-operator-${RUN_ID}-${RUN_ATTEMPT}"
          output_file="$RUNNER_TEMP/nvs-staging-operator.md"

          ssh "${ssh_options[@]}" "$remote" "install -d -m 0700 '$remote_dir'"
          scp "${ssh_options[@]}" \
            ops/staging-operator.py \
            ops/staging-discovery-store.py \
            ops/staging-fixture-discovery.mjs \
            "${remote}:${remote_dir}/"

          printf -v environment_q '%q' "$ENVIRONMENT_ID"
          printf -v expected_q '%q' "$EXPECTED_SHA"
          query_b64="$(printf '%s' "$QUERY" | base64 -w0)"

          set +e
          if [[ "$OPERATION" == verify ]]; then
            ssh "${ssh_options[@]}" "$remote" \
              "python3 '$remote_dir/staging-operator.py' verify --environment-id $environment_q --expected-sha $expected_q" \
              >"$output_file"
            status=$?
          else
            ssh "${ssh_options[@]}" "$remote" \
              "query=\$(printf '%s' '$query_b64' | base64 --decode); python3 '$remote_dir/staging-discovery-store.py' --environment-id $environment_q --query \"\$query\" --discovery-script '$remote_dir/staging-fixture-discovery.mjs' --output-file '/opt/nvs/releases/nvs-fixture-discovery-latest.json'" \
              >"$output_file"
            status=$?
          fi
          set -e

          cat "$output_file"
          {
            echo
            cat "$output_file"
          } >> "$GITHUB_STEP_SUMMARY"

          ssh "${ssh_options[@]}" "$remote" "rm -rf '$remote_dir'" || true
          exit "$status"

      - name: Remove local SSH material
        if: always()
        run: rm -rf "$HOME/.ssh"
