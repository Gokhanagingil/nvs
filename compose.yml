name: nvs-local

services:
  nvs:
    build:
      context: .
      args:
        NVS_BUILD_SHA: ${NVS_BUILD_SHA:-local}
        NVS_BUILD_TIMESTAMP: ${NVS_BUILD_TIMESTAMP:-local}
        NVS_RELEASE_VERSION: ${NVS_RELEASE_VERSION:-0.1.0-local}
    image: nvs:local
    container_name: nvs-local
    restart: unless-stopped
    environment:
      NVS_BUILD_SHA: ${NVS_BUILD_SHA:-local}
      NVS_BUILD_TIMESTAMP: ${NVS_BUILD_TIMESTAMP:-local}
      NVS_RELEASE_VERSION: ${NVS_RELEASE_VERSION:-0.1.0-local}
    ports:
      - 127.0.0.1:${NVS_HOST_PORT:-4100}:4100
    volumes:
      - ./actors:/app/config/actors:ro
      - ./environments:/app/config/environments:ro
      - ./scenarios:/app/config/scenarios:ro
      - nvs-data:/var/lib/nvs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  nvs-data:
