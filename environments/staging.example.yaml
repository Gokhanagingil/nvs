schemaVersion: nvs.environment/v1
id: staging-example
displayName: Sanitized staging NILES example
baseUrl: https://niles-staging.invalid
kind: staging
healthPath: /health/live
readinessPath: /health/ready
openApiPath: /api/docs-json
versionPath: /health/version
capabilities:
  health: true
  readiness: true
  openApi: true
  version: true
authProfileRef: niles.staging-readonly
execution:
  schemaVersion: nvs.environment-execution-policy/v1
  liveApiEnabled: false
  allowedRunTypes: [COMPILE_ONLY, LIVE_API]
  fixtureProfileRef: fixture.incident-payment
  liveRunAllowlist:
    - scenarioId: payment-api-service-degradation
      variationValues:
        journey: normal
enabled: false
